/* ============ Design tokens ============ */
:root {
  --bg: #F4F4F6;
  --bg-elevated: #FFFFFF;
  --card: #FFFFFF;
  --card-pressed: #EAEAEE;
  --fill: rgba(20,20,25,0.06);
  --fill-strong: rgba(20,20,25,0.13);
  --text: #0B0B0C;
  --text-2: rgba(20,20,25,0.55);
  --text-3: rgba(20,20,25,0.28);
  --separator: rgba(20,20,25,0.1);
  --accent: #CDF656;
  --on-accent: #0B0B0C;
  --accent-text: #5C7A00;
  --red: #E5484D;
  --green: #67971F;
  --on-green: #FFFFFF;
  --amber: #C77800;
  --chrome: rgba(248,248,251,0.85);
  --sheet-bg: #F4F4F6;
  --field-bg: #FFFFFF;
  --chip-active-bg: #0B0B0C;
  --chip-active-text: #FFFFFF;
  --manual: #2F6BD8;
  --violet: #6D5BD0;
  --shadow: 0 1px 2px rgba(0,0,0,0.04);
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg: #090909;
    --bg-elevated: #1D1D1F;
    --card: #161618;
    --card-pressed: #242427;
    --fill: rgba(255,255,255,0.07);
    --fill-strong: rgba(255,255,255,0.15);
    --text: #F7F7F4;
    --text-2: rgba(245,245,238,0.55);
    --text-3: rgba(245,245,238,0.28);
    --separator: rgba(255,255,255,0.08);
    --accent: #CDF656;
    --on-accent: #0B0B0C;
    --accent-text: #CDF656;
    --red: #FF5D5D;
    --green: #CDF656;
    --on-green: #0B0B0C;
    --amber: #FFB340;
    --chrome: rgba(9,9,9,0.84);
    --sheet-bg: #161618;
    --field-bg: #242427;
    --chip-active-bg: #F7F7F4;
    --chip-active-text: #0B0B0C;
    --manual: #82B4FF;
    --violet: #BCA9FF;
    --shadow: none;
  }
}

/* ============ Base ============ */
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html { -webkit-text-size-adjust: 100%; }
body {
  font-family: "Outfit", -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", Helvetica, Arial, sans-serif;
  background: var(--bg);
  color: var(--text);
  overscroll-behavior-y: none;
  min-height: 100vh;
}
body.locked { overflow: hidden; }
button { font: inherit; color: inherit; background: none; border: none; cursor: pointer; touch-action: manipulation; }
.num { font-variant-numeric: tabular-nums; font-feature-settings: "tnum"; }
.dec { color: var(--text-2); }

/* ============ Chrome: header + tab bar ============ */
.header {
  position: fixed; top: 0; left: 0; right: 0; z-index: 30;
  background: var(--chrome);
  -webkit-backdrop-filter: saturate(180%) blur(20px);
  backdrop-filter: saturate(180%) blur(20px);
  padding-top: env(safe-area-inset-top, 0px);
  border-bottom: 0.5px solid var(--separator);
}
.header-inner {
  height: 48px; display: flex; align-items: center; justify-content: space-between;
  padding: 0 8px;
}
.header-title { font-size: 17px; font-weight: 600; letter-spacing: -0.4px; position: absolute; left: 50%; transform: translateX(-50%); }
.icon-btn {
  width: 40px; height: 40px; border-radius: 20px; display: flex; align-items: center; justify-content: center;
  color: var(--text); background: var(--fill); transition: background 150ms ease-out;
}
.icon-btn:active { background: var(--fill-strong); }
.icon-btn svg { width: 22px; height: 22px; }
.icon-btn.hidden, .hidden { display: none !important; }

.tabbar {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 30;
  background: var(--chrome);
  -webkit-backdrop-filter: saturate(180%) blur(20px);
  backdrop-filter: saturate(180%) blur(20px);
  border-top: 0.5px solid var(--separator);
  padding-bottom: env(safe-area-inset-bottom, 0px);
  display: flex;
}
.tab {
  flex: 1; display: flex; flex-direction: column; align-items: center; gap: 2px;
  padding: 6px 0 4px; color: var(--text-2); transition: color 150ms ease-out;
  user-select: none; -webkit-user-select: none;
}
.tab svg { width: 24px; height: 24px; }
.tab span { font-size: 10px; font-weight: 500; letter-spacing: 0.1px; }
.tab.active { color: var(--accent-text); }

/* ============ Content ============ */
.content {
  padding: calc(env(safe-area-inset-top, 0px) + 48px + 4px) 16px calc(env(safe-area-inset-bottom, 0px) + 76px);
  max-width: 640px; margin: 0 auto;
}
.view { display: none; animation: viewIn 200ms ease-out; }
.view.active { display: block; }
@keyframes viewIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }

.large-title { font-size: 34px; font-weight: 700; letter-spacing: 0.37px; padding: 8px 0 2px; }
.subtitle { font-size: 15px; color: var(--text-2); margin-bottom: 14px; }

.month-nav { display: flex; align-items: center; justify-content: space-between; margin: 2px 0 14px; }
.month-nav .month-label { font-size: 20px; font-weight: 700; letter-spacing: -0.4px; }
.month-nav button {
  width: 36px; height: 36px; border-radius: 18px; color: var(--text); background: var(--fill);
  display: flex; align-items: center; justify-content: center; transition: background 150ms ease-out;
}
.month-nav button:active { background: var(--fill-strong); }
.month-nav button:disabled { color: var(--text-3); }
.month-nav svg { width: 20px; height: 20px; }

/* ============ Cards & lists ============ */
.card {
  background: var(--card); border-radius: 20px; box-shadow: var(--shadow);
  margin-bottom: 16px; overflow: hidden;
}
.card-pad { padding: 16px; }
.section-header {
  font-size: 13px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.4px;
  color: var(--text-2); margin: 20px 4px 8px; display: flex; justify-content: space-between; align-items: center;
}
.section-header .sh-action { color: var(--accent-text); text-transform: none; font-size: 15px; font-weight: 400; letter-spacing: 0; }

.row {
  display: flex; align-items: center; gap: 12px; padding: 12px 16px;
  position: relative; transition: background 150ms ease-out;
}
.row:not(:last-child)::after {
  content: ""; position: absolute; left: 16px; right: 0; bottom: 0;
  border-bottom: 0.5px solid var(--separator);
}
.row.tappable:active { background: var(--card-pressed); }
.row .row-main { flex: 1; min-width: 0; }
.row .row-title { font-size: 17px; letter-spacing: -0.4px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.row .row-sub { font-size: 13px; color: var(--text-2); margin-top: 1px; }
.row .row-value { font-size: 17px; text-align: right; flex-shrink: 0; }
.row .row-value .rv-sub { font-size: 12px; color: var(--text-2); }
.chevron { color: var(--text-3); flex-shrink: 0; }
.chevron svg { width: 14px; height: 14px; display: block; }

.badge {
  display: inline-block; font-size: 11px; font-weight: 600; padding: 2px 7px; border-radius: 9px;
  vertical-align: 2px; margin-left: 6px;
}
.badge.red { color: var(--red); background: color-mix(in srgb, var(--red) 14%, transparent); }
.badge.green { color: var(--green); background: color-mix(in srgb, var(--green) 14%, transparent); }
.badge.amber { color: var(--amber); background: color-mix(in srgb, var(--amber) 16%, transparent); }
.badge.grey { color: var(--text-2); background: var(--fill); }

.pos { color: var(--green); }
.neg { color: var(--red); }
.warn { color: var(--amber); }
.muted { color: var(--text-2); }

/* ============ Progress bars ============ */
.progress { height: 7px; border-radius: 4px; background: var(--fill-strong); overflow: hidden; }
.progress > div {
  height: 100%; border-radius: 4px; width: 0;
  background: linear-gradient(90deg, color-mix(in srgb, var(--accent) 78%, #f2ffc2), var(--accent));
  transition: width 250ms ease-out;
}
.progress.green > div { background: linear-gradient(90deg, color-mix(in srgb, var(--green) 78%, #f2ffc2), var(--green)); }
.progress.red > div { background: linear-gradient(90deg, color-mix(in srgb, var(--red) 78%, #ffc9c4), var(--red)); }
.progress.amber > div { background: linear-gradient(90deg, color-mix(in srgb, var(--amber) 78%, #ffe2b0), var(--amber)); }

/* ============ Score ring ============ */
.score-card { display: flex; align-items: center; gap: 20px; padding: 20px 16px; }
.score-ring { position: relative; width: 116px; height: 116px; flex-shrink: 0; }
.score-ring svg { transform: rotate(-90deg); }
.score-ring .track { stroke: var(--fill); }
.score-ring .arc { transition: stroke-dashoffset 600ms ease-out, stroke 250ms ease-out; }
.score-num {
  position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center;
}
.score-num b { font-size: 36px; font-weight: 700; letter-spacing: -1px; line-height: 1; }
.score-num span { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.6px; color: var(--text-2); margin-top: 3px; }
.score-info { flex: 1; min-width: 0; }
.score-status { font-size: 20px; font-weight: 700; letter-spacing: -0.4px; }
.score-desc { font-size: 13px; color: var(--text-2); margin-top: 3px; line-height: 1.35; }
.why-btn { color: var(--accent-text); font-size: 15px; margin-top: 8px; padding: 2px 0; display: inline-flex; align-items: center; gap: 4px; }
.why-btn svg { width: 12px; height: 12px; transition: transform 200ms ease-out; }
.why-btn.open svg { transform: rotate(90deg); }
.why-list { border-top: 0.5px solid var(--separator); }
.why-list .row { padding: 10px 16px; }
.why-list .row-title { font-size: 15px; }

/* ============ Segmented control (pill chips) ============ */
.segmented {
  display: flex; gap: 8px; margin-bottom: 12px;
  user-select: none; -webkit-user-select: none;
}
.segmented button {
  flex: 1; padding: 10px 0; font-size: 14px; font-weight: 600; border-radius: 999px;
  background: var(--fill); color: var(--text-2); transition: background 200ms ease-out, color 200ms ease-out;
}
.segmented button.active { background: var(--chip-active-bg); color: var(--chip-active-text); }

/* ============ Filter chips ============ */
.chips {
  display: flex; gap: 8px; overflow-x: auto; margin: 0 -16px 12px; padding: 2px 16px;
  scrollbar-width: none; -webkit-overflow-scrolling: touch; user-select: none; -webkit-user-select: none;
}
.chips::-webkit-scrollbar { display: none; }
.chip {
  flex-shrink: 0; padding: 8px 13px; border-radius: 999px; background: var(--fill);
  color: var(--text-2); font-size: 12px; font-weight: 600; white-space: nowrap;
  transition: background 150ms ease-out, color 150ms ease-out;
}
.chip.active { background: var(--chip-active-bg); color: var(--chip-active-text); }

/* Plan vs Actual */
.pva-row { display: flex; align-items: baseline; gap: 10px; padding: 11px 16px; position: relative; }
.pva-row:not(:last-child)::after { content: ""; position: absolute; left: 16px; right: 0; bottom: 0; border-bottom: 0.5px solid var(--separator); }
.pva-cat { flex: 1; font-size: 15px; }
.pva-cat small { display: block; font-size: 12px; color: var(--text-2); }
.pva-val { font-size: 17px; font-weight: 600; }
.pva-diff { font-size: 13px; font-weight: 600; min-width: 64px; text-align: right; }

/* ============ Summary tiles ============ */
.tiles { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 16px; }
.tile { background: var(--card); border-radius: 20px; padding: 14px; box-shadow: var(--shadow); }
.tile h4 { font-size: 12px; font-weight: 600; color: var(--text-2); text-transform: uppercase; letter-spacing: 0.4px; margin-bottom: 6px; }
.tile .tile-big { font-size: 21px; font-weight: 700; letter-spacing: -0.5px; }
.tile .tile-sub { font-size: 12px; color: var(--text-2); margin-top: 3px; }
.tile .progress { margin-top: 8px; }

/* ============ Big total header ============ */
.big-total { text-align: center; padding: 10px 0 18px; }
.big-total .bt-value { font-size: 40px; font-weight: 700; letter-spacing: -1px; }
.big-total .bt-label { font-size: 13px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-2); margin-top: 2px; }

/* ============ Checkbox (paid tick) ============ */
.check {
  width: 26px; height: 26px; border-radius: 13px; border: 1.5px solid var(--text-3);
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  transition: background 150ms ease-out, border-color 150ms ease-out;
  color: transparent;
}
.check.on { background: var(--green); border-color: var(--green); color: var(--on-green); }
.check svg { width: 14px; height: 14px; }
.check:disabled { opacity: 0.5; }

/* ============ Compact expense rows ============ */
.xrow { display: flex; align-items: center; gap: 10px; padding: 8px 12px 8px 10px; position: relative; }
.xrow:not(:last-child)::after {
  content: ""; position: absolute; left: 24px; right: 0; bottom: 0;
  border-bottom: 0.5px solid var(--separator);
}
.ddbar { width: 4px; height: 30px; border-radius: 2px; background: var(--fill-strong); flex-shrink: 0; }
.ddbar.dd { background: var(--accent); }
.x-main { flex: 1; min-width: 0; }
.x-name { font-size: 15px; font-weight: 500; letter-spacing: -0.2px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.x-due { font-size: 11px; font-weight: 600; color: var(--text-3); margin-left: 6px; }
.x-sub {
  font-size: 9px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px;
  color: var(--text-3); margin-top: 2px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.mm-dd { color: var(--accent-text); opacity: 0.8; }
.mm-man { color: var(--manual); opacity: 0.85; }
.cat-extra { color: var(--amber); opacity: 0.9; }
.cat-custom { color: var(--violet); opacity: 0.9; }

/* Remaining-this-month card */
.remain-card { position: relative; padding: 14px 16px; }
.remain-card h4 { font-size: 11px; font-weight: 600; color: var(--text-3); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 3px; }
.remain-big { font-size: 30px; font-weight: 700; letter-spacing: -0.8px; }
.remain-sub { font-size: 12px; color: var(--text-3); margin-top: 3px; }
.eye-btn {
  position: absolute; top: 10px; right: 10px; width: 34px; height: 34px; border-radius: 17px;
  display: flex; align-items: center; justify-content: center; color: var(--text-2);
  background: var(--fill); transition: background 150ms ease-out;
}
.eye-btn:active { background: var(--fill-strong); }
.eye-btn svg { width: 18px; height: 18px; }
.x-amt { font-size: 14px; font-weight: 600; flex-shrink: 0; }
.x-more {
  width: 30px; height: 30px; border-radius: 15px; color: var(--text-2); flex-shrink: 0;
  display: flex; align-items: center; justify-content: center; transition: background 150ms ease-out;
}
.x-more:active { background: var(--fill); }
.x-more svg { width: 18px; height: 18px; }
.check.sm { width: 24px; height: 24px; border-radius: 12px; }
.check.sm svg { width: 12px; height: 12px; }

/* ============ Action sheet ============ */
.as-backdrop {
  position: fixed; inset: 0; z-index: 55; background: rgba(0,0,0,0.4);
  opacity: 0; pointer-events: none; transition: opacity 180ms ease-out;
}
.as-backdrop.show { opacity: 1; pointer-events: auto; }
.action-sheet {
  position: fixed; left: 10px; right: 10px; bottom: calc(env(safe-area-inset-bottom, 0px) + 10px);
  z-index: 56; max-width: 420px; margin: 0 auto;
  transform: translateY(110%); transition: transform 220ms ease-out;
}
.action-sheet.show { transform: none; }
.as-title { text-align: center; font-size: 13px; color: var(--text-2); padding: 12px 16px 10px; }
.as-group { background: var(--sheet-bg); border-radius: 18px; overflow: hidden; margin-bottom: 8px; }
.as-group button {
  display: block; width: 100%; padding: 15px; font-size: 17px; font-weight: 500; text-align: center;
  color: var(--text); position: relative; transition: background 120ms ease-out;
}
.as-group button:active { background: var(--fill); }
.as-group button:not(:last-child)::after {
  content: ""; position: absolute; left: 0; right: 0; bottom: 0; border-bottom: 0.5px solid var(--separator);
}
.as-group button.destructive { color: var(--red); }
.as-group button.cancel { font-weight: 600; }

/* ============ Buttons ============ */
.btn {
  display: block; width: 100%; text-align: center; padding: 15px; border-radius: 999px;
  font-size: 16px; font-weight: 600; transition: opacity 150ms ease-out, transform 150ms ease-out;
}
.btn:active { opacity: 0.75; transform: scale(0.99); }
.btn.primary { background: var(--accent); color: var(--on-accent); }
.btn.tinted { background: var(--fill); color: var(--text); }
.btn.destructive { background: color-mix(in srgb, var(--red) 12%, transparent); color: var(--red); }
.btn.small { display: inline-block; width: auto; padding: 8px 16px; font-size: 14px; }

.add-fab { margin: 4px 0 8px; }

/* ============ Empty state ============ */
.empty { text-align: center; padding: 48px 24px 24px; }
.empty .empty-icon { color: var(--text-3); margin-bottom: 12px; }
.empty .empty-icon svg { width: 52px; height: 52px; }
.empty h3 { font-size: 20px; font-weight: 700; letter-spacing: -0.4px; margin-bottom: 6px; }
.empty p { font-size: 15px; color: var(--text-2); line-height: 1.4; margin-bottom: 20px; }

/* ============ Bottom sheet ============ */
.sheet-backdrop {
  position: fixed; inset: 0; z-index: 40; background: rgba(0,0,0,0.4);
  opacity: 0; pointer-events: none; transition: opacity 220ms ease-out;
}
.sheet-backdrop.show { opacity: 1; pointer-events: auto; }
.sheet {
  position: fixed; left: 0; right: 0; bottom: 0; z-index: 41;
  background: var(--sheet-bg); border-radius: 24px 24px 0 0;
  transform: translateY(105%); transition: transform 240ms ease-out;
  max-height: 90vh; max-height: 90dvh; display: flex; flex-direction: column;
  max-width: 640px; margin: 0 auto;
}
.sheet.show { transform: none; }
.sheet-head {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 16px 10px; flex-shrink: 0;
}
.sheet-head h2 { font-size: 17px; font-weight: 600; position: absolute; left: 50%; transform: translateX(-50%); }
.sheet-head button { font-size: 17px; color: var(--accent-text); padding: 4px; }
.sheet-head button.bold { font-weight: 600; }
.sheet-body { overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 4px 16px calc(env(safe-area-inset-bottom, 0px) + 24px); }
.grabber { width: 36px; height: 5px; border-radius: 2.5px; background: var(--fill-strong); margin: 6px auto 0; flex-shrink: 0; }

/* ============ Forms ============ */
.form-group { background: var(--field-bg); border-radius: 16px; margin-bottom: 16px; overflow: hidden; }
.form-row { display: flex; align-items: center; padding: 6px 14px; min-height: 48px; position: relative; gap: 10px; }
.form-row:not(:last-child)::after { content: ""; position: absolute; left: 14px; right: 0; bottom: 0; border-bottom: 0.5px solid var(--separator); }
.form-row label { font-size: 17px; letter-spacing: -0.4px; flex-shrink: 0; }
.form-row input[type=text], .form-row input[type=number], .form-row input[type=date], .form-row select, .form-row textarea {
  flex: 1; min-width: 0; border: none; background: transparent; color: var(--text);
  font: inherit; font-size: 17px; text-align: right; outline: none; padding: 10px 0;
  -webkit-appearance: none; appearance: none;
}
.form-row textarea { text-align: left; resize: none; min-height: 64px; }
.form-row input::placeholder, .form-row textarea::placeholder { color: var(--text-3); }
.form-row input[type=date] { color-scheme: light dark; }
.form-hint { font-size: 13px; color: var(--text-2); margin: -8px 4px 16px; line-height: 1.4; }

/* iOS switch */
.switch { position: relative; width: 51px; height: 31px; flex-shrink: 0; margin-left: auto; }
.switch input { opacity: 0; width: 100%; height: 100%; position: absolute; margin: 0; z-index: 1; }
.switch .knob {
  position: absolute; inset: 0; border-radius: 16px; background: var(--fill-strong);
  transition: background 200ms ease-out;
}
.switch .knob::after {
  content: ""; position: absolute; top: 2px; left: 2px; width: 27px; height: 27px; border-radius: 14px;
  background: #fff; box-shadow: 0 2px 5px rgba(0,0,0,0.2); transition: transform 200ms ease-out;
}
.switch input:checked + .knob { background: var(--green); }
.switch input:checked + .knob::after { transform: translateX(20px); }

/* segmented inside forms */
.form-seg { margin: 0 0 16px; }

/* ============ Alert dialog ============ */
.alert-backdrop {
  position: fixed; inset: 0; z-index: 50; background: rgba(0,0,0,0.4);
  display: flex; align-items: center; justify-content: center; padding: 32px;
  opacity: 0; pointer-events: none; transition: opacity 180ms ease-out;
}
.alert-backdrop.show { opacity: 1; pointer-events: auto; }
.alert {
  background: var(--sheet-bg); border-radius: 20px; width: 100%; max-width: 280px; overflow: hidden;
  transform: scale(1.05); transition: transform 180ms ease-out; text-align: center;
  -webkit-backdrop-filter: blur(20px); backdrop-filter: blur(20px);
}
.alert-backdrop.show .alert { transform: none; }
.alert .alert-body { padding: 18px 16px 14px; }
.alert h3 { font-size: 17px; font-weight: 600; margin-bottom: 4px; }
.alert p { font-size: 13px; color: var(--text-2); line-height: 1.4; }
.alert .alert-actions { display: flex; border-top: 0.5px solid var(--separator); }
.alert .alert-actions button {
  flex: 1; padding: 12px; font-size: 17px; color: var(--accent-text); transition: background 120ms ease-out;
}
.alert .alert-actions button:active { background: var(--fill); }
.alert .alert-actions button:not(:last-child) { border-right: 0.5px solid var(--separator); }
.alert .alert-actions button.destructive { color: var(--red); font-weight: 600; }
.alert .alert-actions button.bold { font-weight: 600; }

/* Wishlist */
.impact { font-size: 13px; margin-top: 4px; }
.strike { text-decoration: line-through; color: var(--text-2); }

.footer-note { text-align: center; font-size: 12px; color: var(--text-3); padding: 8px 0 16px; }
</style>
</head>

<script>
"use strict";
/* =====================================================================
   Finance Health — single-file PWA. All state in localStorage.
   ===================================================================== */

const STORAGE_KEY = "financeHealth_v1";

/* ---------- Utilities ---------- */
const $ = (sel, el = document) => el.querySelector(sel);
const $$ = (sel, el = document) => [...el.querySelectorAll(sel)];
const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2, 8);
const esc = s => String(s ?? "").replace(/[&<>"']/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));

const gbp = new Intl.NumberFormat("en-GB", { style: "currency", currency: "GBP", minimumFractionDigits: 2 });
const fmtPlain = n => gbp.format(n || 0);
// Big-figure formatting: pence rendered in a muted tone (£1,250.50 style)
function fmtRich(n) {
  const s = gbp.format(n || 0);
  const i = s.lastIndexOf(".");
  return `<span class="num">${s.slice(0, i)}<span class="dec">${s.slice(i)}</span></span>`;
}

// Debug/testing override: ?t=2026-09-05 pretends today is that date.
function today() {
  const t = new URLSearchParams(location.search).get("t");
  if (t) { const d = new Date(t + "T12:00:00"); if (!isNaN(d)) return d; }
  return new Date();
}
const ymOf = d => `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}`;
const currentYM = () => ymOf(today());
function ymAdd(ym, n) {
  const [y, m] = ym.split("-").map(Number);
  const d = new Date(y, m - 1 + n, 1);
  return ymOf(d);
}
function ymDiff(a, b) { // months from a to b
  const [ya, ma] = a.split("-").map(Number), [yb, mb] = b.split("-").map(Number);
  return (yb - ya) * 12 + (mb - ma);
}
function monthName(ym) {
  const [y, m] = ym.split("-").map(Number);
  return new Date(y, m - 1, 1).toLocaleDateString("en-GB", { month: "long", year: "numeric" });
}
function monthShort(ym) {
  const [y, m] = ym.split("-").map(Number);
  return new Date(y, m - 1, 1).toLocaleDateString("en-GB", { month: "short", year: "numeric" });
}
function daysInMonth(ym) {
  const [y, m] = ym.split("-").map(Number);
  return new Date(y, m, 0).getDate();
}
function fmtDate(iso) {
  if (!iso) return "";
  const d = new Date(iso + (iso.length === 10 ? "T12:00:00" : ""));
  if (isNaN(d)) return "";
  return d.toLocaleDateString("en-GB", { day: "numeric", month: "short", year: "numeric" });
}
const ordinal = n => n + (["th","st","nd","rd"][(n % 100 > 10 && n % 100 < 14) ? 0 : Math.min(n % 10, 4)] || "th");

/* ---------- State ---------- */
const DEFAULT_BANKS = ["Monzo", "Barclays", "Halifax", "Tesco"];
function defaultState() {
  return {
    version: 1,
    settings: { spendingPlan: 0, savingsTarget: 0, expectedFreelance: 0, salary: 0, banks: [...DEFAULT_BANKS], hideRemaining: false },
    months: {},      // "YYYY-MM" -> { expenses:[], savingsAdded:0, plan:{...planSnapshot()}, statements:{bank:{imported,tx:[{d,n,a}]}} }
    recurring: [],   // templates: { id, name, amount, dueDay, startMonth, endMonth|null }
    loans: [],       // { id, name, monthlyPayment, ddDay, endDate, originalTotal, remainingBalance, startMonth, appliedMonths:[], skippedMonths:[] }
    income: [],      // { id, title, amount, expectedDate, status, note, paidDate }
    savings: [],     // { id, name, value, note }
    investments: [], // { id, name, value, note }
    wishlist: []     // { id, name, price, type, monthlyAmount, months, purchased, purchasedDate }
  };
}

let state;
function load() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    state = raw ? Object.assign(defaultState(), JSON.parse(raw)) : defaultState();
  } catch (e) {
    console.error("Failed to load state", e);
    state = defaultState();
  }
  migrate();
}
// Backfill fields added after first release. Safe to run repeatedly.
function migrate() {
  const s = state.settings;
  if (s.salary == null) s.salary = 0;
  if (!Array.isArray(s.banks) || !s.banks.length) s.banks = [...DEFAULT_BANKS];
  if (s.hideRemaining == null) s.hideRemaining = false;
  for (const t of state.recurring) { if (!t.method) t.method = "dd"; if (!t.category) t.category = "Regular"; }
  for (const k in state.months) {
    const m = state.months[k];
    if (m.plan && m.plan.salary == null) m.plan.salary = s.salary || 0;
    for (const e of m.expenses) {
      if (!e.method) e.method = e.recurring ? "dd" : "manual";
      if (!e.category) e.category = "Regular";
    }
  }
}
// Per-month snapshot of the plan figures (kept minimal on purpose)
const planSnapshot = () => ({
  spendingPlan: state.settings.spendingPlan || 0,
  savingsTarget: state.settings.savingsTarget || 0,
  expectedFreelance: state.settings.expectedFreelance || 0,
  salary: state.settings.salary || 0
});
function save() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }
  catch (e) { console.error("Failed to save state", e); }
}

/* ---------- Month engine ---------- */
function newMonth() {
  return {
    expenses: [],
    savingsAdded: 0,
    plan: planSnapshot()
  };
}

// Instantiate recurring templates that are active in month ym and not yet present.
function fillRecurring(ym) {
  const month = state.months[ym];
  for (const t of state.recurring) {
    if (t.startMonth > ym) continue;
    if (t.endMonth && ym > t.endMonth) continue;
    if (month.expenses.some(e => e.recurringId === t.id)) continue;
    month.expenses.push({
      id: uid(), name: t.name, amount: t.amount, dueDay: t.dueDay || null,
      paid: false, recurring: true, recurringId: t.id,
      method: t.method || "dd", category: t.category || "Regular", bank: t.bank || null
    });
  }
}

// Ensure every month from the earliest known up to the current month exists,
// generating recurring expenses along the way. Idempotent.
function ensureMonths() {
  const cur = currentYM();
  const keys = Object.keys(state.months).sort();
  let ym = keys.length ? keys[0] : cur;
  // guard against a future-dated month sneaking in
  if (ym > cur) ym = cur;
  while (ym <= cur) {
    if (!state.months[ym]) state.months[ym] = newMonth();
    fillRecurring(ym);
    ym = ymAdd(ym, 1);
  }
}

// Apply direct-debit loan payments for every elapsed DD day. Idempotent:
// each applied month is recorded so re-running never double-charges.
function processLoans() {
  const cur = currentYM();
  const dayNow = today().getDate();
  for (const loan of state.loans) {
    loan.appliedMonths = loan.appliedMonths || [];
    loan.skippedMonths = loan.skippedMonths || [];
    const endYM = loan.endDate ? loan.endDate.slice(0, 7) : null;
    let ym = loan.startMonth || cur;
    while (ym <= cur) {
      const pastEnd = endYM && ym > endYM;
      const due = ym < cur || (ym === cur && dayNow >= (loan.ddDay || 1));
      if (!pastEnd && due && loan.remainingBalance > 0 &&
          !loan.appliedMonths.includes(ym) && !loan.skippedMonths.includes(ym)) {
        loan.remainingBalance = Math.max(0, +(loan.remainingBalance - loan.monthlyPayment).toFixed(2));
        loan.appliedMonths.push(ym);
      }
      ym = ymAdd(ym, 1);
    }
  }
}

function runEngine() {
  ensureMonths();
  processLoans();
  save();
}

/* ---------- Derived numbers ---------- */
function monthData(ym) { return state.months[ym]; }
function sortedMonthKeys() { return Object.keys(state.months).sort(); }

function expenseTotals(ym) {
  const m = monthData(ym);
  let due = 0, paid = 0;
  for (const e of m.expenses) { due += e.amount; if (e.paid) paid += e.amount; }
  return { due, paid };
}
function billsTotals(ym) { // recurring only
  const m = monthData(ym);
  let due = 0, paid = 0;
  for (const e of m.expenses) if (e.recurring) { due += e.amount; if (e.paid) paid += e.amount; }
  return { due, paid };
}
function isOverdue(e, ym) {
  if (e.paid || !e.dueDay) return false;
  const cur = currentYM();
  if (ym < cur) return true;
  if (ym > cur) return false;
  return today().getDate() > e.dueDay;
}
function loanActiveIn(loan, ym) {
  const endYM = loan.endDate ? loan.endDate.slice(0, 7) : null;
  return (loan.startMonth || "0000") <= ym && (!endYM || ym <= endYM);
}
function loanPlanFor(ym) {
  return state.loans.filter(l => loanActiveIn(l, ym)).reduce((s, l) => s + l.monthlyPayment, 0);
}
function loanPaidFor(ym) {
  return state.loans.filter(l => (l.appliedMonths || []).includes(ym)).reduce((s, l) => s + l.monthlyPayment, 0);
}
function incomeExpectedFor(ym) {
  const entries = state.income.filter(i => i.expectedDate && i.expectedDate.slice(0, 7) === ym);
  if (entries.length) return entries.reduce((s, i) => s + i.amount, 0);
  const m = monthData(ym);
  return m ? (m.plan.expectedFreelance || 0) : 0;
}
function incomeReceivedFor(ym) {
  return state.income.filter(i => i.status === "paid" && i.paidDate && i.paidDate.slice(0, 7) === ym)
    .reduce((s, i) => s + i.amount, 0);
}
function investTotals() {
  const sav = state.savings.reduce((s, e) => s + e.value, 0);
  const inv = state.investments.reduce((s, e) => s + e.value, 0);
  return { sav, inv, total: sav + inv };
}

/* ---------- Health score ---------- */
function healthScore(ym) {
  const m = monthData(ym);
  if (!m) return { score: 100, deductions: [] };
  const cur = currentYM();
  const isPast = ym < cur;
  const deductions = [];

  // 1. Bills unpaid past their due day: −10 each, capped at −30
  const overdue = m.expenses.filter(e => isOverdue(e, ym));
  if (overdue.length) {
    const pts = Math.min(30, overdue.length * 10);
    const names = overdue.slice(0, 3).map(e => e.name).join(", ") + (overdue.length > 3 ? "…" : "");
    deductions.push({ pts, label: `${overdue.length} bill${overdue.length > 1 ? "s" : ""} unpaid past the due day`, detail: names });
  }

  // 2. Overspending vs the monthly spending plan (proportional)
  const plan = m.plan.spendingPlan || 0;
  const spent = expenseTotals(ym).paid;
  if (plan > 0 && spent > plan) {
    const over = (spent - plan) / plan;
    const pts = over >= 0.25 ? 40 : Math.round(over * 150);
    if (pts > 0) deductions.push({
      pts,
      label: `Spending ${Math.round(over * 100)}% over the ${fmtPlain(plan)} plan`,
      detail: `${fmtPlain(spent)} spent so far`
    });
  }

  // 3. Savings target missed near month end
  const target = m.plan.savingsTarget || 0;
  const nearEnd = isPast || (ym === cur && (daysInMonth(ym) - today().getDate()) < 5);
  if (target > 0 && nearEnd && (m.savingsAdded || 0) < target) {
    deductions.push({
      pts: 20,
      label: `Savings target of ${fmtPlain(target)} not met`,
      detail: `${fmtPlain(m.savingsAdded || 0)} added this month`
    });
  }

  // Late freelance payments deliberately do NOT affect the score.
  const score = Math.max(0, 100 - deductions.reduce((s, d) => s + d.pts, 0));
  return { score, deductions };
}
function scoreColor(score) {
  return score >= 80 ? "var(--green)" : score >= 50 ? "var(--amber)" : "var(--red)";
}
function scoreStatus(score) {
  return score >= 90 ? "Excellent" : score >= 80 ? "On track" : score >= 65 ? "Slipping" : score >= 50 ? "Needs attention" : "Off plan";
}

function diffSpan(diff, goodWhenPositive = true) {
  if (Math.abs(diff) < 0.005) return `<span class="pva-diff muted num">±£0</span>`;
  const good = goodWhenPositive ? diff > 0 : diff < 0;
  const sign = diff > 0 ? "+" : "−";
  return `<span class="pva-diff ${good ? "pos" : "neg"} num">${sign}${gbp.format(Math.abs(diff))}</span>`;
}

function expenseMatches(e, f) {
  if (f === "all") return true;

/* ---------- Bank statements (CSV import) ---------- */
// Minimal CSV parser with quoted-field support.
function parseCSV(text) {
  const rows = []; let row = [], field = "", inQ = false;
  for (let i = 0; i < text.length; i++) {
    const c = text[i];
    if (inQ) {
      if (c === '"') { if (text[i + 1] === '"') { field += '"'; i++; } else inQ = false; }
      else field += c;
    } else if (c === '"') inQ = true;
    else if (c === ",") { row.push(field); field = ""; }
    else if (c === "\n" || c === "\r") {
      if (c === "\r" && text[i + 1] === "\n") i++;
      row.push(field); field = "";
      if (row.some(f => f.trim() !== "")) rows.push(row);
      row = [];
    } else field += c;
  }
  if (field !== "" || row.length) { row.push(field); if (row.some(f => f.trim() !== "")) rows.push(row); }
  return rows;
}
const MONTHS3 = ["jan", "feb", "mar", "apr", "may", "jun", "jul", "aug", "sep", "oct", "nov", "dec"];
function parseDateFlexible(s) {
  s = (s || "").trim();
  let m = s.match(/^(\d{4})-(\d{2})-(\d{2})/);                    // ISO (Monzo)
  if (m) return `${m[1]}-${m[2]}-${m[3]}`;
  m = s.match(/^(\d{1,2})[\/\-.](\d{1,2})[\/\-.](\d{2,4})$/);     // DD/MM/YYYY (UK banks)
  if (m) {
    const y = m[3].length === 2 ? "20" + m[3] : m[3];
    return `${y}-${String(m[2]).padStart(2, "0")}-${String(m[1]).padStart(2, "0")}`;
  }
  m = s.match(/^(\d{1,2})\s+([A-Za-z]{3,})\s+(\d{2,4})$/);        // 03 Jul 2026
  if (m) {
    const mo = MONTHS3.indexOf(m[2].slice(0, 3).toLowerCase()) + 1;
    if (mo) {
      const y = m[3].length === 2 ? "20" + m[3] : m[3];
      return `${y}-${String(mo).padStart(2, "0")}-${String(m[1]).padStart(2, "0")}`;
    }
  }
  return null;
}
function parseMoney(s) {
  s = (s || "").trim().replace(/[£$€,\s]/g, "");
  if (s === "" || isNaN(+s)) return null;
  return +s;
}
// Auto-detects the date / amount (or debit+credit) / description columns of a
// bank CSV export. Returns [{d:"YYYY-MM-DD", n:"desc", a:amount}] with a<0 = money out.
function parseStatement(text) {
  const rows = parseCSV(text);
  if (rows.length < 2) return null;
  const header = rows[0].map(h => (h || "").toLowerCase().trim());
  const data = rows.slice(1);
  const ncol = Math.max(...rows.map(r => r.length));
  let dateCol = -1, best = 0;
  for (let c = 0; c < ncol; c++) {
    const n = data.filter(r => parseDateFlexible(r[c])).length;
    if (n > best) { best = n; dateCol = c; }
  }
  if (dateCol < 0 || best < data.length * 0.5) return null;
  const hIdx = re => header.findIndex(h => re.test(h));
  let outCol = hIdx(/debit|money out|paid out/), inCol = hIdx(/credit|money in|paid in/);
  let amtCol = -1;
  if (outCol < 0 || inCol < 0 || outCol === inCol) {
    outCol = inCol = -1;
    amtCol = hIdx(/^amount$|amount \(|^value$/);
    if (amtCol === dateCol) amtCol = -1;
    if (amtCol < 0) {
      let bestN = 0;
      for (let c = 0; c < ncol; c++) {
        if (c === dateCol || /balance|number|sort|account/.test(header[c] || "")) continue;
        const n = data.filter(r => parseMoney(r[c]) !== null).length;
        if (n > bestN) { bestN = n; amtCol = c; }
      }
    }
  }
  let descCol = hIdx(/desc|memo|^name$|merchant|reference|narrative/);
  if (descCol === dateCol || descCol === amtCol) descCol = -1;
  if (descCol < 0) {
    let bestL = -1;
    for (let c = 0; c < ncol; c++) {
      if (c === dateCol || c === amtCol || c === outCol || c === inCol) continue;
      const nNum = data.filter(r => parseMoney(r[c]) !== null).length;
      if (nNum > data.length * 0.8) continue;
      const L = data.reduce((s, r) => s + ((r[c] || "").length), 0);
      if (L > bestL) { bestL = L; descCol = c; }
    }
  }
  const tx = [];
  for (const r of data) {
    const d = parseDateFlexible(r[dateCol]);
    if (!d) continue;
    let a = null;
    if (amtCol >= 0) a = parseMoney(r[amtCol]);
    else {
      const o = parseMoney(r[outCol]), inc = parseMoney(r[inCol]);
      if (o != null && o !== 0) a = -Math.abs(o);
      else if (inc != null) a = Math.abs(inc);
      else a = null;
    }
    if (a === null) continue;
    tx.push({ d, n: ((descCol >= 0 && r[descCol]) || "Transaction").trim().slice(0, 60), a });
  }
  return tx.length ? tx : null;
}

let pendingStmtBank = null;
window.importStatement = () => {
  const banks = state.settings.banks || DEFAULT_BANKS;
  actionSheet("Which bank is this statement from?", banks.map(b => ({
    label: b, fn: () => { pendingStmtBank = b; $("#stmtFile").click(); }
  })));
};
$("#stmtFile").addEventListener("change", async (ev) => {
  const file = ev.target.files[0];
  ev.target.value = "";
  const bank = pendingStmtBank;
  pendingStmtBank = null;
  if (!file || !bank) return;
  let tx;
  try { tx = parseStatement(await file.text()); } catch { tx = null; }
  if (!tx) {
    showAlert("Couldn't read that file", "It doesn't look like a bank CSV export. Export the statement as CSV from your banking app and try again.", [{ label: "OK", style: "bold", value: true }]);
    return;
  }
  const cur = currentYM();
  const byMonth = {};
  for (const t of tx) {
    const ym = t.d.slice(0, 7);
    if (ym > cur) continue; // ignore future-dated rows
    (byMonth[ym] = byMonth[ym] || []).push(t);
  }
  const months = Object.keys(byMonth).sort();
  if (!months.length) return;
  const out = tx.reduce((s, t) => s + (t.a < 0 ? -t.a : 0), 0);
  const inn = tx.reduce((s, t) => s + (t.a > 0 ? t.a : 0), 0);
  const ok = await confirmDialog("Import statement?",
    `${bank}: ${tx.length} transactions (${months.map(monthShort).join(", ")}). Money out ${fmtPlain(out)}, in ${fmtPlain(inn)}. This replaces any earlier ${bank} import for these months.`,
    "Import", "bold");
  if (!ok) return;
  for (const ym of months) {
    if (!state.months[ym]) state.months[ym] = newMonth();
    const m = state.months[ym];
    m.statements = m.statements || {};
    m.statements[bank] = {
      imported: today().toISOString().slice(0, 10),
      tx: byMonth[ym].sort((a, b) => a.a - b.a).slice(0, 500)
    };
  }
  runEngine();
  save();
  expYM = months[months.length - 1];
  render();
});

window.openStatementSheet = (ym, bank) => {
  const m = monthData(ym);
  const st = m?.statements?.[bank];
  if (!st) return;
  const out = st.tx.reduce((s, t) => s + (t.a < 0 ? -t.a : 0), 0);
  const inn = st.tx.reduce((s, t) => s + (t.a > 0 ? t.a : 0), 0);
  const tracked = expenseTotals(ym).paid;
  // aggregate spend by description => "where the money actually went"
  const agg = {};
  for (const t of st.tx) if (t.a < 0) {
    const k = t.n;
    agg[k] = agg[k] || { total: 0, n: 0 };
    agg[k].total += -t.a; agg[k].n++;
  }
  const top = Object.entries(agg).sort((a, b) => b[1].total - a[1].total).slice(0, 10);
  const dayOf = d => `<span class="muted num" style="font-size:11px">${d.slice(8, 10)}</span>`;
  openSheet(`${bank} — ${monthShort(ym)}`, `
    <div class="card"><div class="pva-row">

    </div>`).join("")}</div>
    <button class="btn destructive" onclick="deleteStatement('${ym}','${esc(bank)}')">Remove this statement</button>
  `, () => {}, { saveLabel: "Done" });
};
window.deleteStatement = async (ym, bank) => {
  closeSheet();

function loanMonthsLeft(loan) {
  if (!loan.endDate) return null;
  const diff = ymDiff(currentYM(), loan.endDate.slice(0, 7));
  return Math.max(0, diff);
}
function renderLoans() {

    const left = loanMonthsLeft(l);

      : emptyState(emptyIcon, "Nothing tracked yet", "Add savings pots and investments to see your total grow. Adding to savings counts toward your monthly target.", "Add Savings Pot", "openInvestSheet('savings')")}
  `;
}

/* ---------- Wishlist ---------- */
function renderWishlist() {
  const active = state.wishlist.filter(w => !w.purchased);
  const bought = state.wishlist.filter(w => w.purchased).sort((a, b) => (b.purchasedDate || "").localeCompare(a.purchasedDate || ""));
  const m = monthData(currentYM());
  const plan = m.plan.spendingPlan || state.settings.spendingPlan || 0;
  const spent = expenseTotals(currentYM()).paid;
  const remaining = Math.max(0, plan - spent);

  const itemRow = w => {
    let impact;
    if (w.type === "installments") {
      impact = `<span class="warn">Adds ${gbp.format(w.monthlyAmount)}/month for ${w.months} months</span>`;
    } else if (plan > 0) {
      const pctUse = remaining > 0 ? (w.price / remaining * 100) : Infinity;
      const cls = pctUse > 100 ? "neg" : pctUse > 50 ? "warn" : "pos";
      impact = isFinite(pctUse)
        ? `<span class="${cls}">Would use ${Math.round(pctUse)}% of this month's remaining budget</span>`
        : `<span class="neg">No budget left this month</span>`;
    } else {
      impact = `<span class="muted">Set a spending plan in Settings to see impact</span>`;
    }
    return `<div class="row tappable" onclick="openWishlistSheet('${w.id}')">
      <div class="row-main">
        <div class="row-title">${esc(w.name)}</div>
        <div class="row-sub">${w.type === "installments" ? `Installments · ${w.months} × ${gbp.format(w.monthlyAmount)}` : "Buy outright"}</div>
        <div class="impact num">${impact}</div>
      </div>
      <div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px">
        <div class="row-value num">${gbp.format(w.price)}</div>
        <button class="btn small tinted" onclick="event.stopPropagation(); buyItem('${w.id}')">Buy</button>
      </div>
    </div>`;
  };
  const boughtRow = w => `<div class="row tappable" onclick="openWishlistSheet('${w.id}')">
    <div class="row-main">
      <div class="row-title strike">${esc(w.name)}</div>
      <div class="row-sub">Purchased ${fmtDate(w.purchasedDate)}${w.type === "installments" ? ` · ${w.months} × ${gbp.format(w.monthlyAmount)}` : ""}</div>
    </div>
    <div class="row-value muted num">${gbp.format(w.price)}</div>
  </div>`;

  const emptyIcon = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20.3s-7.6-4.6-9.3-9A4.8 4.8 0 0 1 12 7.2a4.8 4.8 0 0 1 9.3 4c-1.7 4.5-9.3 9-9.3 9.1z"/></svg>';

  $("#view-wishlist").innerHTML = `
    <div class="large-title">Wishlist</div>
    <div class="subtitle">See the impact before you buy.</div>
    ${state.wishlist.length ? `
      ${active.length ? `<div class="card">${active.map(itemRow).join("")}</div>` : `<div class="card card-pad muted" style="font-size:15px">Nothing on the wishlist right now.</div>`}
      <button class="btn primary add-fab" onclick="openWishlistSheet()">＋ Add to Wishlist</button>
      ${bought.length ? `<div class="section-header">Purchased</div><div class="card">${bought.map(boughtRow).join("")}</div>` : ""}`
      : emptyState(emptyIcon, "Wishlist is empty", "Add things you want to buy. Each one shows what it would do to this month's budget before you commit.", "Add to Wishlist", "openWishlistSheet()")}
  `;
}

   Sheets, forms & dialogs

let sheetOnSave = null;

function openSheet(title, bodyHTML, onSave, { saveLabel = "Save" } = {}) {
  $("#sheetTitle").textContent = title;
  $("#sheetBody").innerHTML = bodyHTML;
  $("#sheetSave").textContent = saveLabel;
  sheetOnSave = onSave;
  document.body.classList.add("locked");
  $("#sheetBackdrop").classList.add("show");
  $("#sheet").classList.add("show");
  const first = $("#sheetBody input[type=text]");
  if (first) setTimeout(() => first.focus({ preventScroll: true }), 260);
}
function closeSheet() {
  sheetOnSave = null;
  document.body.classList.remove("locked");
  $("#sheetBackdrop").classList.remove("show");
  $("#sheet").classList.remove("show");
}
$("#sheetCancel").addEventListener("click", closeSheet);
$("#sheetBackdrop").addEventListener("click", closeSheet);
$("#sheetSave").addEventListener("click", () => { if (sheetOnSave && sheetOnSave() !== false) closeSheet(); });

function showAlert(title, msg, actions) {
  // actions: [{label, style, value}]
  return new Promise(resolve => {
    $("#alertTitle").textContent = title;
    $("#alertMsg").textContent = msg;
    const box = $("#alertActions");
    box.innerHTML = "";
    for (const a of actions) {
      const b = document.createElement("button");
      b.textContent = a.label;
      if (a.style) b.className = a.style;
      b.addEventListener("click", () => { $("#alertBackdrop").classList.remove("show"); resolve(a.value); });
      box.appendChild(b);
    }
    $("#alertBackdrop").classList.add("show");
  });
}
const confirmDialog = (title, msg, actionLabel = "Delete", style = "destructive") =>
  showAlert(title, msg, [{ label: "Cancel", value: false }, { label: actionLabel, style, value: true }]);

/* Bottom action sheet: items = [{label, style?, fn?}] */
function actionSheet(title, items) {
  const box = $("#actionSheetBox");
  box.innerHTML = `
    <div class="as-group">
      ${title ? `<div class="as-title">${esc(title)}</div>` : ""}
      ${items.map((it, i) => `<button class="${it.style || ""}" data-i="${i}">${esc(it.label)}</button>`).join("")}
    </div>
    <div class="as-group"><button class="cancel">Cancel</button></div>`;
  const close = () => {
    $("#asBackdrop").classList.remove("show");
    box.classList.remove("show");
  };
  box.onclick = ev => {
    const b = ev.target.closest("button");
    if (!b) return;
    close();
    if (b.dataset.i != null) { const it = items[+b.dataset.i]; if (it.fn) it.fn(); }
  };
  $("#asBackdrop").onclick = close;
  $("#asBackdrop").classList.add("show");
  box.classList.add("show");
}

const fDate = (id, label, value = "") =>

const fSwitch = (id, label, on) =>

const deleteBtn = (fn) => `<button class="btn destructive" style="margin-top:4px" onclick="${fn}">Delete</button>`;

const val = id => $("#" + id).value.trim();
const num = id => { const v = parseFloat($("#" + id).value); return isNaN(v) ? 0 : v; };
const dayVal = id => { const v = parseInt($("#" + id).value, 10); return (v >= 1 && v <= 31) ? v : null; };

/* ---------- Expense sheet ---------- */
// Remembered between "Save & Add Another" rounds so bulk entry is fast.
let expDefaults = { method: "dd", category: "Regular", bankDD: "", bankMan: "" };

function saveExpenseForm(e) {
  const m = monthData(expYM);
  const name = val("fx-name"), amount = num("fx-amount");
  if (!name) return invalid("fx-name", "Give the expense a name.");
  if (amount <= 0) return invalid("fx-amount", "Enter an amount greater than zero.");
  const dueDay = dayVal("fx-due");
  const rec = checked("fx-rec");
  const method = $("#fx-method .active").dataset.v;
  let category = val("fx-cat-sel") === "__custom" ? val("fx-cat-custom") : val("fx-cat-sel");
  if (!category) category = "Regular";
  const bank = val("fx-bank") || null;
  expDefaults = { ...expDefaults, method, category, [method === "dd" ? "bankDD" : "bankMan"]: bank || "" };
  if (e) {
    e.name = name; e.amount = amount; e.dueDay = dueDay; e.paid = checked("fx-paid");
    e.method = method; e.category = category; e.bank = bank;
    if (rec && !e.recurring) { // became recurring
      const t = { id: uid(), name, amount, dueDay, startMonth: expYM, endMonth: null, method, category, bank };
      state.recurring.push(t);
      e.recurring = true; e.recurringId = t.id;
    } else if (!rec && e.recurring) { // stopped recurring
      state.recurring = state.recurring.filter(t => t.id !== e.recurringId);
      e.recurring = false; e.recurringId = null;
    } else if (rec && e.recurringId) { // keep template in sync for future months
      const t = state.recurring.find(t => t.id === e.recurringId);
      if (t) { t.name = name; t.amount = amount; t.dueDay = dueDay; t.method = method; t.category = category; t.bank = bank; }
    }
  } else {
    const ex = { id: uid(), name, amount, dueDay, paid: false, recurring: rec, recurringId: null, method, category, bank };
    if (rec) {
      const t = { id: uid(), name, amount, dueDay, startMonth: expYM, endMonth: null, method, category, bank };
      state.recurring.push(t);
      ex.recurringId = t.id;
    }
    m.expenses.push(ex);
  }
  save(); render();
  return true;
}

window.openExpenseSheet = (id) => {

  openSheet(e ? "Edit Expense" : "New Expense", `
    <div class="segmented form-seg" id="fx-method">

    </div>
    <div class="form-group">
      ${fText("fx-name", "Name", e?.name || "", "e.g. Rent")}
      ${fAmount("fx-amount", "Amount", e?.amount ?? "")}
      ${fDay("fx-due", "Due day", e?.dueDay ?? "")}
      ${fSelect("fx-cat-sel", "Category", [
        ...stdCats.map(c => ({ value: c, label: c })),
        ...(isCustomCat ? [{ value: category, label: category }] : []),
        { value: "__custom", label: "Custom…" }

      <div id="fx-cat-custom-row" class="hidden">${fText("fx-cat-custom", "Custom name", "", "e.g. Subscriptions")}</div>
      ${fSelect("fx-bank", "Bank", [{ value: "", label: "None" }, ...bankList.map(b => ({ value: b, label: b }))], bank)}

    ${e ? "" : `<button class="btn tinted" style="margin-bottom:8px" onclick="saveExpenseAndNext()">Save &amp; Add Another</button>`}
    ${e ? deleteBtn(`deleteExpense('${e.id}')`) : ""}

  const catSel = $("#fx-cat-sel");

// Bulk entry: save current form, reopen a fresh one (method/category carried over)
window.saveExpenseAndNext = () => {
  if (saveExpenseForm(null)) { closeSheet(); openExpenseSheet(); }
};
window.deleteExpense = async (id) => {
  const m = monthData(expYM);
  const e = m.expenses.find(x => x.id === id);
  if (!e) return;
  closeSheet();
  const msg = e.recurring
    ? `“${e.name}” is recurring. Deleting removes it from this month and stops it appearing in future months. Past months keep their history.`
    : `Delete “${e.name}” from ${monthName(expYM)}?`;
  if (await confirmDialog("Delete expense?", msg)) {
    if (e.recurringId) state.recurring = state.recurring.filter(t => t.id !== e.recurringId);
    m.expenses = m.expenses.filter(x => x.id !== id);

/* ---------- Loan sheet ---------- */
window.openLoanSheet = (id) => {
  const l = id ? state.loans.find(x => x.id === id) : null;
  const cur = currentYM();
  const skipped = l ? (l.skippedMonths || []).includes(cur) : false;
  openSheet(l ? "Edit Loan" : "New Loan", `
    <div class="form-group">
      ${fText("fl-name", "Name", l?.name || "", "e.g. Car finance")}
      ${fAmount("fl-payment", "Monthly payment", l?.monthlyPayment ?? "")}
      ${fDay("fl-dd", "Direct debit day", l?.ddDay ?? "")}
      ${fDate("fl-end", "End date", l?.endDate || "")}
      ${fAmount("fl-balance", "Remaining balance", l?.remainingBalance ?? "")}
    </div>
    ${l ? `<div class="form-group">${fSwitch("fl-skip", `Skip ${monthShort(cur)} payment`, skipped)}</div>
    <div class="form-hint">Skipping stops (or reverses) this month's automatic balance reduction. Edit the balance above any time to correct for overpayments.</div>` :
    `<div class="form-hint">The balance drops by the monthly payment automatically each time the direct debit day passes.</div>`}
    ${l ? deleteBtn(`deleteLoan('${l.id}')`) : ""}
  `, () => {
    const name = val("fl-name"), payment = num("fl-payment"), balance = num("fl-balance");
    const ddDay = dayVal("fl-dd"), endDate = val("fl-end") || null;
    if (!name) return invalid("fl-name", "Give the loan a name.");
    if (payment <= 0) return invalid("fl-payment", "Enter the monthly payment.");
    if (!ddDay) return invalid("fl-dd", "Enter the direct debit day (1–31).");
    if (l) {
      l.name = name; l.monthlyPayment = payment; l.ddDay = ddDay; l.endDate = endDate;
      l.remainingBalance = balance; // manual override always wins
      const wasSkipped = (l.skippedMonths || []).includes(cur);
      const wantSkip = checked("fl-skip");
      if (wantSkip && !wasSkipped) {
        // If this month already auto-applied, reverse it.
        if ((l.appliedMonths || []).includes(cur)) {
          l.appliedMonths = l.appliedMonths.filter(m => m !== cur);
          l.remainingBalance = +(l.remainingBalance + l.monthlyPayment).toFixed(2);
        }
        l.skippedMonths = [...(l.skippedMonths || []), cur];
      } else if (!wantSkip && wasSkipped) {
        l.skippedMonths = l.skippedMonths.filter(m => m !== cur);
        // engine will re-apply on next run if the DD day has passed
      }
    } else {
      const loan = {
        id: uid(), name, monthlyPayment: payment, ddDay, endDate,
        originalTotal: balance, remainingBalance: balance,
        startMonth: cur, appliedMonths: [], skippedMonths: []
      };
      // The entered balance already reflects any payment taken earlier this month.
      if (today().getDate() >= ddDay) loan.appliedMonths.push(cur);
      state.loans.push(loan);
    }
    save(); render();
  });
};
window.deleteLoan = async (id) => {
  const l = state.loans.find(x => x.id === id);

  if (await confirmDialog("Delete loan?", `Delete “${l.name}” and its payment history?`)) {

  });
  $("#fw-seg").addEventListener("click", ev => {
    const b = ev.target.closest("button"); if (!b) return;
    $$("#fw-seg button").forEach(x => x.classList.toggle("active", x === b));
    $("#fw-inst").style.display = b.dataset.v === "installments" ? "" : "none";
    $("#fw-hint").textContent = b.dataset.v === "installments"
      ? "Buying creates a recurring expense that expires automatically after the last installment."
      : "Buying adds a one-off expense to this month, ticked as paid.";
  });
};
window.deleteWishlist = async (id) => {
  const w = state.wishlist.find(x => x.id === id);
  if (!w) return;
  closeSheet();
  if (await confirmDialog("Remove item?", `Remove “${w.name}” from the wishlist?${w.purchased ? " Its expense entries are kept." : ""}`, "Remove")) {
    state.wishlist = state.wishlist.filter(x => x.id !== id);
    save(); render();
  }
};
window.buyItem = async (id) => {
  const w = state.wishlist.find(x => x.id === id);
  if (!w || w.purchased) return;
  const cur = currentYM();
  const msg = w.type === "installments"
    ? `This adds a recurring expense of ${fmtPlain(w.monthlyAmount)}/month for ${w.months} months, starting now.`
    : `This adds ${fmtPlain(w.price)} as a paid one-off expense in ${monthName(cur)}.`;
  if (!await confirmDialog(`Buy ${w.name}?`, msg, "Buy", "bold")) return;
  const m = monthData(cur);
  if (w.type === "installments") {
    const t = {
      id: uid(), name: w.name, amount: w.monthlyAmount, dueDay: today().getDate(),
      startMonth: cur, endMonth: ymAdd(cur, w.months - 1), method: "dd", category: "Extra"
    };
    state.recurring.push(t);
    m.expenses.push({ id: uid(), name: w.name, amount: w.monthlyAmount, dueDay: t.dueDay, paid: false, recurring: true, recurringId: t.id, method: "dd", category: "Extra" });
  } else {
    m.expenses.push({ id: uid(), name: w.name, amount: w.price, dueDay: today().getDate(), paid: true, recurring: false, recurringId: null, method: "manual", category: "Extra" });
  }
  w.purchased = true;
  w.purchasedDate = today().toISOString().slice(0, 10);
  save(); render();
};

/* ---------- Settings ---------- */
window.openSettings = () => {
  const s = state.settings;
  openSheet("Settings", `
    <div class="section-header" style="margin-top:4px">Income</div>
    <div class="form-group">
      ${fAmount("st-salary", "Monthly salary", s.salary || "")}
      ${fAmount("st-income", "Expected freelance", s.expectedFreelance || "")}
    </div>
    <div class="form-hint">Salary + freelance received drive the "Remaining this month" figure. Set it once, update whenever it changes.</div>
    <div class="section-header">Monthly plan</div>
    <div class="form-group">
      ${fAmount("st-spend", "Spending plan", s.spendingPlan || "")}
      ${fAmount("st-save", "Savings target", s.savingsTarget || "")}
    </div>
    <div class="form-hint">The spending plan drives the overspending part of your health score.</div>
    <div class="section-header">Banks</div>
    <div class="form-group">
      ${fText("st-banks", "Banks", (s.banks || []).join(", "), "Monzo, Barclays…")}
    </div>
    <div class="form-hint">Comma-separated. Used for tagging expenses and importing bank statements.</div>
    <div class="section-header">Backup</div>
    <div class="form-group">
      <div class="form-row tappable" style="cursor:pointer" onclick="exportBackup()">
        <label style="color:var(--accent-text)">Export backup…</label>
      </div>
      <div class="form-row tappable" style="cursor:pointer" onclick="importBackup()">
        <label style="color:var(--accent-text)">Import backup…</label>
      </div>
    </div>
    <div class="form-hint">Export downloads all data as a JSON file. Import restores from one, replacing everything on this device.</div>
  `, () => {
    const banks = val("st-banks").split(",").map(b => b.trim()).filter(Boolean);
    state.settings = {
      ...state.settings,
      spendingPlan: num("st-spend"),
      savingsTarget: num("st-save"),
      expectedFreelance: num("st-income"),
      salary: num("st-salary"),
      banks: banks.length ? banks : [...DEFAULT_BANKS]
    };
    // keep the current month's plan snapshot in sync
    const m = monthData(currentYM());
    if (m) m.plan = planSnapshot();
    save(); render();
  });
};
window.exportBackup = () => {
  const blob = new Blob([JSON.stringify(state, null, 2)], { type: "application/json" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = `finance-health-backup-${today().toISOString().slice(0, 10)}.json`;
  document.body.appendChild(a);
  a.click();
  a.remove();
  setTimeout(() => URL.revokeObjectURL(a.href), 2000);
};
window.importBackup = () => $("#importFile").click();
$("#importFile").addEventListener("change", async (ev) => {
  const file = ev.target.files[0];
  ev.target.value = "";
  if (!file) return;
  let data;
  try { data = JSON.parse(await file.text()); }
  catch { showAlert("Import failed", "That file isn't a valid Finance Health backup.", [{ label: "OK", style: "bold", value: true }]); return; }
  if (!data || typeof data !== "object" || !data.months || !data.settings) {
    showAlert("Import failed", "That file isn't a valid Finance Health backup.", [{ label: "OK", style: "bold", value: true }]);
    return;
  }
  if (await confirmDialog("Restore backup?", "This replaces ALL current data on this device with the backup. This can't be undone.", "Restore")) {
    state = Object.assign(defaultState(), data);
    save();
    closeSheet();
    homeYM = currentYM(); expYM = currentYM();
    render();
  }
});

/* ---------- Boot ---------- */
$("#hdrGear").addEventListener("click", () => window.openSettings());
$("#tabbar").addEventListener("click", ev => {
  const b = ev.target.closest(".tab");
  if (b) switchTab(b.dataset.tab);
});
document.addEventListener("visibilitychange", () => {
  // re-run rollover logic when returning to the app (new day / new month)
  if (!document.hidden) { homeYM = currentYM(); expYM = currentYM(); render(); }
});

load();
runEngine();
switchTab("home");

if ("serviceWorker" in navigator && location.protocol !== "file:") {
  window.addEventListener("load", () => navigator.serviceWorker.register("./sw.js").catch(() => {}));
}
</script>
</body>
</html>

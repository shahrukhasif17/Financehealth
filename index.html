<!DOCTYPE html>
<html lang="en-GB">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Finance Health</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Finance Health">
<meta name="theme-color" media="(prefers-color-scheme: light)" content="#F2F2F7">
<meta name="theme-color" media="(prefers-color-scheme: dark)" content="#000000">
<link rel="manifest" href="./manifest.json">
<link rel="apple-touch-icon" href="./icon-180.png">
<link rel="icon" href="./icon-180.png">
<style>
/* ============ Design tokens ============ */
:root {
  --bg: #F2F2F7;
  --bg-elevated: #FFFFFF;
  --card: #FFFFFF;
  --card-pressed: #E5E5EA;
  --fill: rgba(120,120,128,0.16);
  --fill-strong: rgba(120,120,128,0.24);
  --text: #000000;
  --text-2: rgba(60,60,67,0.6);
  --text-3: rgba(60,60,67,0.3);
  --separator: rgba(60,60,67,0.29);
  --accent: #007AFF;
  --red: #FF3B30;
  --green: #34C759;
  --amber: #FF9500;
  --chrome: rgba(249,249,249,0.82);
  --sheet-bg: #F2F2F7;
  --field-bg: #FFFFFF;
  --shadow: 0 1px 2px rgba(0,0,0,0.04);
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg: #000000;
    --bg-elevated: #1C1C1E;
    --card: #1C1C1E;
    --card-pressed: #2C2C2E;
    --fill: rgba(120,120,128,0.24);
    --fill-strong: rgba(120,120,128,0.36);
    --text: #FFFFFF;
    --text-2: rgba(235,235,245,0.6);
    --text-3: rgba(235,235,245,0.3);
    --separator: rgba(84,84,88,0.6);
    --accent: #0A84FF;
    --red: #FF453A;
    --green: #30D158;
    --amber: #FF9F0A;
    --chrome: rgba(18,18,20,0.78);
    --sheet-bg: #1C1C1E;
    --field-bg: #2C2C2E;
    --shadow: none;
  }
}

/* ============ Base ============ */
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html { -webkit-text-size-adjust: 100%; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", Helvetica, Arial, sans-serif;
  background: var(--bg);
  color: var(--text);
  overscroll-behavior-y: none;
  min-height: 100vh;
}
body.locked { overflow: hidden; }
button { font: inherit; color: inherit; background: none; border: none; cursor: pointer; touch-action: manipulation; }
.num { font-variant-numeric: tabular-nums; font-feature-settings: "tnum"; }

/* ============ Chrome: header + tab bar ============ */
.header {
  position: fixed; top: 0; left: 0; right: 0; z-index: 30;
  background: var(--chrome);
  -webkit-backdrop-filter: saturate(180%) blur(20px);
  backdrop-filter: saturate(180%) blur(20px);
  padding-top: env(safe-area-inset-top, 0px);
  border-bottom: 0.5px solid var(--separator);
}
.header-inner {
  height: 48px; display: flex; align-items: center; justify-content: space-between;
  padding: 0 8px;
}
.header-title { font-size: 17px; font-weight: 600; letter-spacing: -0.4px; position: absolute; left: 50%; transform: translateX(-50%); }
.icon-btn {
  width: 40px; height: 40px; border-radius: 20px; display: flex; align-items: center; justify-content: center;
  color: var(--accent); transition: background 150ms ease-out;
}
.icon-btn:active { background: var(--fill); }
.icon-btn svg { width: 22px; height: 22px; }
.icon-btn.hidden, .hidden { display: none !important; }

.tabbar {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 30;
  background: var(--chrome);
  -webkit-backdrop-filter: saturate(180%) blur(20px);
  backdrop-filter: saturate(180%) blur(20px);
  border-top: 0.5px solid var(--separator);
  padding-bottom: env(safe-area-inset-bottom, 0px);
  display: flex;
}
.tab {
  flex: 1; display: flex; flex-direction: column; align-items: center; gap: 2px;
  padding: 6px 0 4px; color: var(--text-2); transition: color 150ms ease-out;
  user-select: none; -webkit-user-select: none;
}
.tab svg { width: 24px; height: 24px; }
.tab span { font-size: 10px; font-weight: 500; letter-spacing: 0.1px; }
.tab.active { color: var(--accent); }

/* ============ Content ============ */
.content {
  padding: calc(env(safe-area-inset-top, 0px) + 48px + 4px) 16px calc(env(safe-area-inset-bottom, 0px) + 76px);
  max-width: 640px; margin: 0 auto;
}
.view { display: none; animation: viewIn 200ms ease-out; }
.view.active { display: block; }
@keyframes viewIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }

.large-title { font-size: 34px; font-weight: 700; letter-spacing: 0.37px; padding: 8px 0 2px; }
.subtitle { font-size: 15px; color: var(--text-2); margin-bottom: 14px; }

.month-nav { display: flex; align-items: center; justify-content: space-between; margin: 2px 0 14px; }
.month-nav .month-label { font-size: 20px; font-weight: 700; letter-spacing: -0.4px; }
.month-nav button {
  width: 36px; height: 36px; border-radius: 18px; color: var(--accent);
  display: flex; align-items: center; justify-content: center; transition: background 150ms ease-out;
}
.month-nav button:active { background: var(--fill); }
.month-nav button:disabled { color: var(--text-3); }
.month-nav svg { width: 20px; height: 20px; }

/* ============ Cards & lists ============ */
.card {
  background: var(--card); border-radius: 16px; box-shadow: var(--shadow);
  margin-bottom: 16px; overflow: hidden;
}
.card-pad { padding: 16px; }
.section-header {
  font-size: 13px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.4px;
  color: var(--text-2); margin: 20px 4px 8px; display: flex; justify-content: space-between; align-items: center;
}
.section-header .sh-action { color: var(--accent); text-transform: none; font-size: 15px; font-weight: 400; letter-spacing: 0; }

.row {
  display: flex; align-items: center; gap: 12px; padding: 12px 16px;
  position: relative; transition: background 150ms ease-out;
}
.row:not(:last-child)::after {
  content: ""; position: absolute; left: 16px; right: 0; bottom: 0;
  border-bottom: 0.5px solid var(--separator);
}
.row.tappable:active { background: var(--card-pressed); }
.row .row-main { flex: 1; min-width: 0; }
.row .row-title { font-size: 17px; letter-spacing: -0.4px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.row .row-sub { font-size: 13px; color: var(--text-2); margin-top: 1px; }
.row .row-value { font-size: 17px; text-align: right; flex-shrink: 0; }
.row .row-value .rv-sub { font-size: 12px; color: var(--text-2); }
.chevron { color: var(--text-3); flex-shrink: 0; }
.chevron svg { width: 14px; height: 14px; display: block; }

.badge {
  display: inline-block; font-size: 11px; font-weight: 600; padding: 2px 7px; border-radius: 9px;
  vertical-align: 2px; margin-left: 6px;
}
.badge.red { color: var(--red); background: color-mix(in srgb, var(--red) 14%, transparent); }
.badge.green { color: var(--green); background: color-mix(in srgb, var(--green) 14%, transparent); }
.badge.amber { color: var(--amber); background: color-mix(in srgb, var(--amber) 16%, transparent); }
.badge.grey { color: var(--text-2); background: var(--fill); }

.pos { color: var(--green); }
.neg { color: var(--red); }
.warn { color: var(--amber); }
.muted { color: var(--text-2); }

/* ============ Progress bars ============ */
.progress { height: 6px; border-radius: 3px; background: var(--fill); overflow: hidden; }
.progress > div {
  height: 100%; border-radius: 3px; width: 0;
  background: linear-gradient(90deg, color-mix(in srgb, var(--accent) 80%, #7cc0ff), var(--accent));
  transition: width 250ms ease-out;
}
.progress.green > div { background: linear-gradient(90deg, color-mix(in srgb, var(--green) 75%, #a8e8b8), var(--green)); }
.progress.red > div { background: linear-gradient(90deg, color-mix(in srgb, var(--red) 75%, #ffb0aa), var(--red)); }
.progress.amber > div { background: linear-gradient(90deg, color-mix(in srgb, var(--amber) 75%, #ffd699), var(--amber)); }

/* ============ Score ring ============ */
.score-card { display: flex; align-items: center; gap: 20px; padding: 20px 16px; }
.score-ring { position: relative; width: 116px; height: 116px; flex-shrink: 0; }
.score-ring svg { transform: rotate(-90deg); }
.score-ring .track { stroke: var(--fill); }
.score-ring .arc { transition: stroke-dashoffset 600ms ease-out, stroke 250ms ease-out; }
.score-num {
  position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center;
}
.score-num b { font-size: 36px; font-weight: 700; letter-spacing: -1px; line-height: 1; }
.score-num span { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.6px; color: var(--text-2); margin-top: 3px; }
.score-info { flex: 1; min-width: 0; }
.score-status { font-size: 20px; font-weight: 700; letter-spacing: -0.4px; }
.score-desc { font-size: 13px; color: var(--text-2); margin-top: 3px; line-height: 1.35; }
.why-btn { color: var(--accent); font-size: 15px; margin-top: 8px; padding: 2px 0; display: inline-flex; align-items: center; gap: 4px; }
.why-btn svg { width: 12px; height: 12px; transition: transform 200ms ease-out; }
.why-btn.open svg { transform: rotate(90deg); }
.why-list { border-top: 0.5px solid var(--separator); }
.why-list .row { padding: 10px 16px; }
.why-list .row-title { font-size: 15px; }

/* ============ Segmented control ============ */
.segmented {
  display: flex; background: var(--fill); border-radius: 9px; padding: 2px; margin-bottom: 12px;
  position: relative; user-select: none; -webkit-user-select: none;
}
.segmented button {
  flex: 1; padding: 6px 0; font-size: 13px; font-weight: 600; border-radius: 7px;
  color: var(--text); transition: background 200ms ease-out, box-shadow 200ms ease-out;
}
.segmented button.active { background: var(--bg-elevated); box-shadow: 0 1px 4px rgba(0,0,0,0.12); }
@media (prefers-color-scheme: dark) { .segmented button.active { background: #636366; } }

/* Plan vs Actual */
.pva-row { display: flex; align-items: baseline; gap: 10px; padding: 11px 16px; position: relative; }
.pva-row:not(:last-child)::after { content: ""; position: absolute; left: 16px; right: 0; bottom: 0; border-bottom: 0.5px solid var(--separator); }
.pva-cat { flex: 1; font-size: 15px; }
.pva-cat small { display: block; font-size: 12px; color: var(--text-2); }
.pva-val { font-size: 17px; font-weight: 600; }
.pva-diff { font-size: 13px; font-weight: 600; min-width: 64px; text-align: right; }

/* ============ Summary tiles ============ */
.tiles { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 16px; }
.tile { background: var(--card); border-radius: 16px; padding: 14px; box-shadow: var(--shadow); }
.tile h4 { font-size: 12px; font-weight: 600; color: var(--text-2); text-transform: uppercase; letter-spacing: 0.4px; margin-bottom: 6px; }
.tile .tile-big { font-size: 21px; font-weight: 700; letter-spacing: -0.5px; }
.tile .tile-sub { font-size: 12px; color: var(--text-2); margin-top: 3px; }
.tile .progress { margin-top: 8px; }

/* ============ Big total header ============ */
.big-total { text-align: center; padding: 10px 0 18px; }
.big-total .bt-value { font-size: 40px; font-weight: 700; letter-spacing: -1px; }
.big-total .bt-label { font-size: 13px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-2); margin-top: 2px; }

/* ============ Checkbox (paid tick) ============ */
.check {
  width: 26px; height: 26px; border-radius: 13px; border: 1.5px solid var(--text-3);
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  transition: background 150ms ease-out, border-color 150ms ease-out;
  color: transparent;
}
.check.on { background: var(--green); border-color: var(--green); color: #fff; }
.check svg { width: 14px; height: 14px; }
.check:disabled { opacity: 0.5; }

/* ============ Buttons ============ */
.btn {
  display: block; width: 100%; text-align: center; padding: 14px; border-radius: 13px;
  font-size: 17px; font-weight: 600; transition: opacity 150ms ease-out, transform 150ms ease-out;
}
.btn:active { opacity: 0.75; transform: scale(0.99); }
.btn.primary { background: var(--accent); color: #fff; }
.btn.tinted { background: color-mix(in srgb, var(--accent) 14%, transparent); color: var(--accent); }
.btn.destructive { background: color-mix(in srgb, var(--red) 12%, transparent); color: var(--red); }
.btn.small { display: inline-block; width: auto; padding: 8px 16px; font-size: 15px; border-radius: 20px; }

.add-fab { margin: 4px 0 8px; }

/* ============ Empty state ============ */
.empty { text-align: center; padding: 48px 24px 24px; }
.empty .empty-icon { color: var(--text-3); margin-bottom: 12px; }
.empty .empty-icon svg { width: 52px; height: 52px; }
.empty h3 { font-size: 20px; font-weight: 700; letter-spacing: -0.4px; margin-bottom: 6px; }
.empty p { font-size: 15px; color: var(--text-2); line-height: 1.4; margin-bottom: 20px; }

/* ============ Bottom sheet ============ */
.sheet-backdrop {
  position: fixed; inset: 0; z-index: 40; background: rgba(0,0,0,0.4);
  opacity: 0; pointer-events: none; transition: opacity 220ms ease-out;
}
.sheet-backdrop.show { opacity: 1; pointer-events: auto; }
.sheet {
  position: fixed; left: 0; right: 0; bottom: 0; z-index: 41;
  background: var(--sheet-bg); border-radius: 16px 16px 0 0;
  transform: translateY(105%); transition: transform 240ms ease-out;
  max-height: 90vh; max-height: 90dvh; display: flex; flex-direction: column;
  max-width: 640px; margin: 0 auto;
}
.sheet.show { transform: none; }
.sheet-head {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 16px 10px; flex-shrink: 0;
}
.sheet-head h2 { font-size: 17px; font-weight: 600; position: absolute; left: 50%; transform: translateX(-50%); }
.sheet-head button { font-size: 17px; color: var(--accent); padding: 4px; }
.sheet-head button.bold { font-weight: 600; }
.sheet-body { overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 4px 16px calc(env(safe-area-inset-bottom, 0px) + 24px); }
.grabber { width: 36px; height: 5px; border-radius: 2.5px; background: var(--fill-strong); margin: 6px auto 0; flex-shrink: 0; }

/* ============ Forms ============ */
.form-group { background: var(--field-bg); border-radius: 12px; margin-bottom: 16px; overflow: hidden; }
.form-row { display: flex; align-items: center; padding: 6px 14px; min-height: 48px; position: relative; gap: 10px; }
.form-row:not(:last-child)::after { content: ""; position: absolute; left: 14px; right: 0; bottom: 0; border-bottom: 0.5px solid var(--separator); }
.form-row label { font-size: 17px; letter-spacing: -0.4px; flex-shrink: 0; }
.form-row input[type=text], .form-row input[type=number], .form-row input[type=date], .form-row select, .form-row textarea {
  flex: 1; min-width: 0; border: none; background: transparent; color: var(--text);
  font: inherit; font-size: 17px; text-align: right; outline: none; padding: 10px 0;
  -webkit-appearance: none; appearance: none;
}
.form-row textarea { text-align: left; resize: none; min-height: 64px; }
.form-row input::placeholder, .form-row textarea::placeholder { color: var(--text-3); }
.form-row input[type=date] { color-scheme: light dark; }
.form-hint { font-size: 13px; color: var(--text-2); margin: -8px 4px 16px; line-height: 1.4; }

/* iOS switch */
.switch { position: relative; width: 51px; height: 31px; flex-shrink: 0; margin-left: auto; }
.switch input { opacity: 0; width: 100%; height: 100%; position: absolute; margin: 0; z-index: 1; }
.switch .knob {
  position: absolute; inset: 0; border-radius: 16px; background: var(--fill-strong);
  transition: background 200ms ease-out;
}
.switch .knob::after {
  content: ""; position: absolute; top: 2px; left: 2px; width: 27px; height: 27px; border-radius: 14px;
  background: #fff; box-shadow: 0 2px 5px rgba(0,0,0,0.2); transition: transform 200ms ease-out;
}
.switch input:checked + .knob { background: var(--green); }
.switch input:checked + .knob::after { transform: translateX(20px); }

/* segmented inside forms */
.form-seg { margin: 0 0 16px; }

/* ============ Alert dialog ============ */
.alert-backdrop {
  position: fixed; inset: 0; z-index: 50; background: rgba(0,0,0,0.4);
  display: flex; align-items: center; justify-content: center; padding: 32px;
  opacity: 0; pointer-events: none; transition: opacity 180ms ease-out;
}
.alert-backdrop.show { opacity: 1; pointer-events: auto; }
.alert {
  background: var(--sheet-bg); border-radius: 14px; width: 100%; max-width: 280px; overflow: hidden;
  transform: scale(1.05); transition: transform 180ms ease-out; text-align: center;
  -webkit-backdrop-filter: blur(20px); backdrop-filter: blur(20px);
}
.alert-backdrop.show .alert { transform: none; }
.alert .alert-body { padding: 18px 16px 14px; }
.alert h3 { font-size: 17px; font-weight: 600; margin-bottom: 4px; }
.alert p { font-size: 13px; color: var(--text-2); line-height: 1.4; }
.alert .alert-actions { display: flex; border-top: 0.5px solid var(--separator); }
.alert .alert-actions button {
  flex: 1; padding: 12px; font-size: 17px; color: var(--accent); transition: background 120ms ease-out;
}
.alert .alert-actions button:active { background: var(--fill); }
.alert .alert-actions button:not(:last-child) { border-right: 0.5px solid var(--separator); }
.alert .alert-actions button.destructive { color: var(--red); font-weight: 600; }
.alert .alert-actions button.bold { font-weight: 600; }

/* Wishlist */
.impact { font-size: 13px; margin-top: 4px; }
.strike { text-decoration: line-through; color: var(--text-2); }

.footer-note { text-align: center; font-size: 12px; color: var(--text-3); padding: 8px 0 16px; }
</style>
</head>

<header class="header">
  <div class="header-inner">
    <button class="icon-btn hidden" id="hdrLeft" aria-label="Back"></button>
    <div class="header-title" id="hdrTitle">Finance Health</div>
    <button class="icon-btn" id="hdrGear" aria-label="Settings">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3.2"/><path d="M19.4 15a1.7 1.7 0 0 0 .34 1.87l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.7 1.7 0 0 0-1.87-.34 1.7 1.7 0 0 0-1.03 1.56V21a2 2 0 1 1-4 0v-.09a1.7 1.7 0 0 0-1.11-1.56 1.7 1.7 0 0 0-1.87.34l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.7 1.7 0 0 0 .34-1.87 1.7 1.7 0 0 0-1.56-1.03H3a2 2 0 1 1 0-4h.09a1.7 1.7 0 0 0 1.56-1.11 1.7 1.7 0 0 0-.34-1.87l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.7 1.7 0 0 0 1.87.34h.08a1.7 1.7 0 0 0 1.03-1.56V3a2 2 0 1 1 4 0v.09a1.7 1.7 0 0 0 1.03 1.56h.08a1.7 1.7 0 0 0 1.87-.34l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.7 1.7 0 0 0-.34 1.87v.08a1.7 1.7 0 0 0 1.56 1.03H21a2 2 0 1 1 0 4h-.09a1.7 1.7 0 0 0-1.56 1.03z"/></svg>
    </button>
  </div>
</header>

<main class="content">
  <section class="view" id="view-home"></section>
  <section class="view" id="view-expenses"></section>
  <section class="view" id="view-loans"></section>
  <section class="view" id="view-income"></section>
  <section class="view" id="view-invest"></section>
  <section class="view" id="view-wishlist"></section>
</main>

<nav class="tabbar" id="tabbar">
  <button class="tab" data-tab="home">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 10.5 12 3l9 7.5"/><path d="M5 9.5V21h14V9.5"/><path d="M9.5 21v-6h5v6"/></svg>
    <span>Home</span>
  </button>
  <button class="tab" data-tab="expenses">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="15" rx="2.5"/><path d="M3 9.5h18"/><path d="M6.5 14.5h4"/></svg>
    <span>Expenses</span>
  </button>
  <button class="tab" data-tab="loans">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9.5 12 4l9 5.5"/><path d="M5 10v8M9.7 10v8M14.3 10v8M19 10v8"/><path d="M3 20.5h18"/></svg>
    <span>Loans</span>
  </button>
  <button class="tab" data-tab="income">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M14.8 8.6a3 3 0 0 0-5 2.2c0 2.3-.6 3.6-1.3 4.7h6"/><path d="M8.5 12.9h4.5"/></svg>
    <span>Income</span>
  </button>
  <button class="tab" data-tab="invest">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 20.5h18"/><path d="M4 16.5l5-5 3.5 3.5L20 8.5"/><path d="M15.5 8.5H20V13"/></svg>
    <span>Invest</span>

    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20.3s-7.6-4.6-9.3-9A4.8 4.8 0 0 1 12 7.2a4.8 4.8 0 0 1 9.3 4c-1.7 4.5-9.3 9-9.3 9.1z"/></svg>

  </button>
</nav>

<input type="file" id="importFile" accept="application/json,.json" class="hidden">

<script>
"use strict";
/* =====================================================================
   Finance Health — single-file PWA. All state in localStorage.
   ===================================================================== */

const STORAGE_KEY = "financeHealth_v1";

/* ---------- Utilities ---------- */
const $ = (sel, el = document) => el.querySelector(sel);
const $$ = (sel, el = document) => [...el.querySelectorAll(sel)];
const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2, 8);
const esc = s => String(s ?? "").replace(/[&<>"']/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));

const gbp = new Intl.NumberFormat("en-GB", { style: "currency", currency: "GBP", minimumFractionDigits: 2 });
const fmtPlain = n => gbp.format(n || 0);

// Debug/testing override: ?t=2026-09-05 pretends today is that date.
function today() {
  const t = new URLSearchParams(location.search).get("t");
  if (t) { const d = new Date(t + "T12:00:00"); if (!isNaN(d)) return d; }
  return new Date();
}
const ymOf = d => `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}`;
const currentYM = () => ymOf(today());
function ymAdd(ym, n) {
  const [y, m] = ym.split("-").map(Number);
  const d = new Date(y, m - 1 + n, 1);
  return ymOf(d);
}
function ymDiff(a, b) { // months from a to b
  const [ya, ma] = a.split("-").map(Number), [yb, mb] = b.split("-").map(Number);
  return (yb - ya) * 12 + (mb - ma);
}
function monthName(ym) {
  const [y, m] = ym.split("-").map(Number);
  return new Date(y, m - 1, 1).toLocaleDateString("en-GB", { month: "long", year: "numeric" });
}
function monthShort(ym) {
  const [y, m] = ym.split("-").map(Number);
  return new Date(y, m - 1, 1).toLocaleDateString("en-GB", { month: "short", year: "numeric" });
}
function daysInMonth(ym) {
  const [y, m] = ym.split("-").map(Number);
  return new Date(y, m, 0).getDate();
}
function fmtDate(iso) {
  if (!iso) return "";
  const d = new Date(iso + (iso.length === 10 ? "T12:00:00" : ""));
  if (isNaN(d)) return "";
  return d.toLocaleDateString("en-GB", { day: "numeric", month: "short", year: "numeric" });
}
const ordinal = n => n + (["th","st","nd","rd"][(n % 100 > 10 && n % 100 < 14) ? 0 : Math.min(n % 10, 4)] || "th");

/* ---------- State ---------- */
function defaultState() {
  return {
    version: 1,
    settings: { spendingPlan: 0, savingsTarget: 0, expectedFreelance: 0 },
    months: {},      // "YYYY-MM" -> { expenses:[], savingsAdded:0, plan:{spendingPlan,savingsTarget,expectedFreelance} }
    recurring: [],   // templates: { id, name, amount, dueDay, startMonth, endMonth|null }
    loans: [],       // { id, name, monthlyPayment, ddDay, endDate, originalTotal, remainingBalance, startMonth, appliedMonths:[], skippedMonths:[] }
    income: [],      // { id, title, amount, expectedDate, status, note, paidDate }
    savings: [],     // { id, name, value, note }
    investments: [], // { id, name, value, note }
    wishlist: []     // { id, name, price, type, monthlyAmount, months, purchased, purchasedDate }
  };
}

let state;
function load() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    state = raw ? Object.assign(defaultState(), JSON.parse(raw)) : defaultState();
  } catch (e) {
    console.error("Failed to load state", e);
    state = defaultState();
  }
}
function save() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }
  catch (e) { console.error("Failed to save state", e); }
}

/* ---------- Month engine ---------- */
function newMonth() {
  return {
    expenses: [],
    savingsAdded: 0,
    plan: { ...state.settings }
  };
}

// Instantiate recurring templates that are active in month ym and not yet present.
function fillRecurring(ym) {
  const month = state.months[ym];
  for (const t of state.recurring) {
    if (t.startMonth > ym) continue;
    if (t.endMonth && ym > t.endMonth) continue;
    if (month.expenses.some(e => e.recurringId === t.id)) continue;
    month.expenses.push({
      id: uid(), name: t.name, amount: t.amount, dueDay: t.dueDay || null,
      paid: false, recurring: true, recurringId: t.id
    });
  }
}

// Ensure every month from the earliest known up to the current month exists,
// generating recurring expenses along the way. Idempotent.
function ensureMonths() {
  const cur = currentYM();
  const keys = Object.keys(state.months).sort();
  let ym = keys.length ? keys[0] : cur;
  // guard against a future-dated month sneaking in
  if (ym > cur) ym = cur;
  while (ym <= cur) {
    if (!state.months[ym]) state.months[ym] = newMonth();
    fillRecurring(ym);
    ym = ymAdd(ym, 1);
  }
}

// Apply direct-debit loan payments for every elapsed DD day. Idempotent:
// each applied month is recorded so re-running never double-charges.
function processLoans() {
  const cur = currentYM();
  const dayNow = today().getDate();
  for (const loan of state.loans) {
    loan.appliedMonths = loan.appliedMonths || [];
    loan.skippedMonths = loan.skippedMonths || [];
    const endYM = loan.endDate ? loan.endDate.slice(0, 7) : null;
    let ym = loan.startMonth || cur;
    while (ym <= cur) {
      const pastEnd = endYM && ym > endYM;
      const due = ym < cur || (ym === cur && dayNow >= (loan.ddDay || 1));
      if (!pastEnd && due && loan.remainingBalance > 0 &&
          !loan.appliedMonths.includes(ym) && !loan.skippedMonths.includes(ym)) {
        loan.remainingBalance = Math.max(0, +(loan.remainingBalance - loan.monthlyPayment).toFixed(2));
        loan.appliedMonths.push(ym);
      }
      ym = ymAdd(ym, 1);
    }
  }
}

function runEngine() {
  ensureMonths();
  processLoans();
  save();
}

/* ---------- Derived numbers ---------- */
function monthData(ym) { return state.months[ym]; }
function sortedMonthKeys() { return Object.keys(state.months).sort(); }

function expenseTotals(ym) {
  const m = monthData(ym);
  let due = 0, paid = 0;
  for (const e of m.expenses) { due += e.amount; if (e.paid) paid += e.amount; }
  return { due, paid };
}
function billsTotals(ym) { // recurring only
  const m = monthData(ym);
  let due = 0, paid = 0;
  for (const e of m.expenses) if (e.recurring) { due += e.amount; if (e.paid) paid += e.amount; }
  return { due, paid };
}
function isOverdue(e, ym) {
  if (e.paid || !e.dueDay) return false;
  const cur = currentYM();
  if (ym < cur) return true;
  if (ym > cur) return false;
  return today().getDate() > e.dueDay;
}
function loanActiveIn(loan, ym) {
  const endYM = loan.endDate ? loan.endDate.slice(0, 7) : null;
  return (loan.startMonth || "0000") <= ym && (!endYM || ym <= endYM);
}
function loanPlanFor(ym) {
  return state.loans.filter(l => loanActiveIn(l, ym)).reduce((s, l) => s + l.monthlyPayment, 0);
}
function loanPaidFor(ym) {
  return state.loans.filter(l => (l.appliedMonths || []).includes(ym)).reduce((s, l) => s + l.monthlyPayment, 0);
}
function incomeExpectedFor(ym) {
  const entries = state.income.filter(i => i.expectedDate && i.expectedDate.slice(0, 7) === ym);
  if (entries.length) return entries.reduce((s, i) => s + i.amount, 0);
  const m = monthData(ym);
  return m ? (m.plan.expectedFreelance || 0) : 0;
}
function incomeReceivedFor(ym) {
  return state.income.filter(i => i.status === "paid" && i.paidDate && i.paidDate.slice(0, 7) === ym)
    .reduce((s, i) => s + i.amount, 0);
}
function investTotals() {
  const sav = state.savings.reduce((s, e) => s + e.value, 0);
  const inv = state.investments.reduce((s, e) => s + e.value, 0);
  return { sav, inv, total: sav + inv };
}

/* ---------- Health score ---------- */
function healthScore(ym) {
  const m = monthData(ym);
  if (!m) return { score: 100, deductions: [] };
  const cur = currentYM();
  const isPast = ym < cur;
  const deductions = [];

  // 1. Bills unpaid past their due day: −10 each, capped at −30
  const overdue = m.expenses.filter(e => isOverdue(e, ym));
  if (overdue.length) {
    const pts = Math.min(30, overdue.length * 10);
    const names = overdue.slice(0, 3).map(e => e.name).join(", ") + (overdue.length > 3 ? "…" : "");
    deductions.push({ pts, label: `${overdue.length} bill${overdue.length > 1 ? "s" : ""} unpaid past the due day`, detail: names });
  }

  // 2. Overspending vs the monthly spending plan (proportional)
  const plan = m.plan.spendingPlan || 0;
  const spent = expenseTotals(ym).paid;
  if (plan > 0 && spent > plan) {
    const over = (spent - plan) / plan;
    const pts = over >= 0.25 ? 40 : Math.round(over * 150);
    if (pts > 0) deductions.push({
      pts,
      label: `Spending ${Math.round(over * 100)}% over the ${fmtPlain(plan)} plan`,
      detail: `${fmtPlain(spent)} spent so far`
    });
  }

  // 3. Savings target missed near month end
  const target = m.plan.savingsTarget || 0;
  const nearEnd = isPast || (ym === cur && (daysInMonth(ym) - today().getDate()) < 5);
  if (target > 0 && nearEnd && (m.savingsAdded || 0) < target) {
    deductions.push({
      pts: 20,
      label: `Savings target of ${fmtPlain(target)} not met`,
      detail: `${fmtPlain(m.savingsAdded || 0)} added this month`
    });
  }

  // Late freelance payments deliberately do NOT affect the score.
  const score = Math.max(0, 100 - deductions.reduce((s, d) => s + d.pts, 0));
  return { score, deductions };
}
function scoreColor(score) {
  return score >= 80 ? "var(--green)" : score >= 50 ? "var(--amber)" : "var(--red)";
}
function scoreStatus(score) {
  return score >= 90 ? "Excellent" : score >= 80 ? "On track" : score >= 65 ? "Slipping" : score >= 50 ? "Needs attention" : "Off plan";
}

/* ---------- Rendering scaffolding ---------- */
let activeTab = "home";
let homeYM = currentYM();
let expYM = currentYM();
let homeSeg = "actual";
let whyOpen = false;

const TAB_TITLES = { home: "Finance Health", expenses: "Expenses", loans: "Loans", income: "Income", invest: "Invest", wishlist: "Wishlist" };

function switchTab(tab) {
  activeTab = tab;
  $$(".tab").forEach(b => b.classList.toggle("active", b.dataset.tab === tab));
  $$(".view").forEach(v => v.classList.toggle("active", v.id === "view-" + tab));
  $("#hdrTitle").textContent = TAB_TITLES[tab];
  render();
  window.scrollTo(0, 0);
}
function render() {
  runEngine();
  ({ home: renderHome, expenses: renderExpenses, loans: renderLoans,
     income: renderIncome, invest: renderInvest, wishlist: renderWishlist })[activeTab]();
}

const chevronLeft = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M14.5 5.5 8 12l6.5 6.5"/></svg>';
const chevronRight = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M9.5 5.5 16 12l-6.5 6.5"/></svg>';
const chevronSmall = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M9.5 5.5 16 12l-6.5 6.5"/></svg>';
const tick = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round"><path d="M4.5 12.5 10 18 19.5 7"/></svg>';

function monthNav(ym, canPrev, canNext, fnName) {
  return `<div class="month-nav">
    <button ${canPrev ? "" : "disabled"} onclick="${fnName}(-1)" aria-label="Previous month">${chevronLeft}</button>
    <div class="month-label">${monthName(ym)}</div>
    <button ${canNext ? "" : "disabled"} onclick="${fnName}(1)" aria-label="Next month">${chevronRight}</button>
  </div>`;
}
function emptyState(iconSvg, title, text, btnLabel, onclick) {
  return `<div class="empty">
    <div class="empty-icon">${iconSvg}</div>
    <h3>${title}</h3><p>${text}</p>
    ${btnLabel ? `<button class="btn primary" style="max-width:240px;margin:0 auto" onclick="${onclick}">${btnLabel}</button>` : ""}
  </div>`;
}
function diffSpan(diff, goodWhenPositive = true) {
  if (Math.abs(diff) < 0.005) return `<span class="pva-diff muted num">±£0</span>`;
  const good = goodWhenPositive ? diff > 0 : diff < 0;
  const sign = diff > 0 ? "+" : "−";
  return `<span class="pva-diff ${good ? "pos" : "neg"} num">${sign}${gbp.format(Math.abs(diff))}</span>`;
}

/* ---------- Home ---------- */
window.homeNav = d => { homeYM = ymAdd(homeYM, d); whyOpen = false; render(); };
window.setHomeSeg = s => { homeSeg = s; render(); };
window.toggleWhy = () => { whyOpen = !whyOpen; render(); };

function renderHome() {
  const ym = homeYM;
  const keys = sortedMonthKeys();
  if (!keys.includes(ym)) homeYM = currentYM();
  const m = monthData(homeYM);
  const { score, deductions } = healthScore(homeYM);
  const col = scoreColor(score);
  const R = 52, C = 2 * Math.PI * R;
  const offset = C * (1 - score / 100);
  const isCur = homeYM === currentYM();

  const exp = expenseTotals(homeYM);
  const bills = billsTotals(homeYM);
  const loanPlan = loanPlanFor(homeYM), loanPaid = loanPaidFor(homeYM);
  const incExpected = incomeExpectedFor(homeYM), incReceived = incomeReceivedFor(homeYM);
  const pendingTotal = state.income.filter(i => i.status === "pending").reduce((s, i) => s + i.amount, 0);
  const inv = investTotals();
  const plan = m.plan;

  const whyRows = deductions.length
    ? deductions.map(d => `<div class="row"><div class="row-main"><div class="row-title">${esc(d.label)}</div>${d.detail ? `<div class="row-sub">${esc(d.detail)}</div>` : ""}</div><div class="row-value neg num">−${d.pts}</div></div>`).join("")
    : `<div class="row"><div class="row-main"><div class="row-title muted">No deductions — a perfect month so far.</div></div></div>`;

  const pvaCats = [
    { name: "Bills", planSub: `${state.months[homeYM].expenses.filter(e=>e.recurring).length} recurring`, plan: bills.due, actual: bills.paid, actualSub: "paid so far", diff: bills.paid - bills.due, goodPos: true },
    { name: "Spending", planSub: "monthly budget", plan: plan.spendingPlan || 0, actual: exp.paid, actualSub: "total spent", diff: (plan.spendingPlan || 0) - exp.paid, goodPos: true, isSpend: true },
    { name: "Freelance", planSub: "expected", plan: incExpected, actual: incReceived, actualSub: "received", diff: incReceived - incExpected, goodPos: true },
    { name: "Savings", planSub: "target", plan: plan.savingsTarget || 0, actual: m.savingsAdded || 0, actualSub: "added", diff: (m.savingsAdded || 0) - (plan.savingsTarget || 0), goodPos: true },
    { name: "Loan payments", planSub: "due", plan: loanPlan, actual: loanPaid, actualSub: "made", diff: loanPaid - loanPlan, goodPos: true }
  ];
  const pvaRows = pvaCats.map(c => {
    if (homeSeg === "plan") {
      return `<div class="pva-row"><div class="pva-cat">${c.name}<small>${c.planSub}</small></div><div class="pva-val num">${gbp.format(c.plan)}</div></div>`;
    }
    const spendNote = c.isSpend && c.diff < 0 ? "" : "";
    return `<div class="pva-row">
      <div class="pva-cat">${c.name}<small>plan ${gbp.format(c.plan)}</small></div>
      <div class="pva-val num">${gbp.format(c.actual)}</div>
      ${diffSpan(c.diff, c.goodPos)}${spendNote}
    </div>`;
  }).join("");

  const expPct = exp.due > 0 ? Math.min(100, exp.paid / exp.due * 100) : 0;

  $("#view-home").innerHTML = `
    ${monthNav(homeYM, keys[0] < homeYM, !isCur, "homeNav")}

    <div class="card">
      <div class="score-card">
        <div class="score-ring">
          <svg width="116" height="116" viewBox="0 0 116 116">
            <circle class="track" cx="58" cy="58" r="${R}" fill="none" stroke-width="9"/>
            <circle class="arc" cx="58" cy="58" r="${R}" fill="none" stroke-width="9" stroke-linecap="round"
              stroke="${col}" stroke-dasharray="${C}" stroke-dashoffset="${C}" data-target="${offset}"/>
          </svg>
          <div class="score-num"><b class="num" style="color:${col}">${score}</b><span>Score</span></div>
        </div>
        <div class="score-info">
          <div class="score-status" style="color:${col}">${scoreStatus(score)}</div>
          <div class="score-desc">${isCur ? "Your financial health this month." : `How ${monthShort(homeYM)} ended up.`}</div>
          <button class="why-btn ${whyOpen ? "open" : ""}" onclick="toggleWhy()">Why this score? ${chevronSmall}</button>
        </div>
      </div>
      <div class="why-list ${whyOpen ? "" : "hidden"}">${whyRows}</div>
    </div>

    <div class="section-header">Plan vs Actual</div>
    <div class="segmented">
      <button class="${homeSeg === "plan" ? "active" : ""}" onclick="setHomeSeg('plan')">Plan</button>
      <button class="${homeSeg === "actual" ? "active" : ""}" onclick="setHomeSeg('actual')">Actual</button>
    </div>
    <div class="card">${pvaRows}</div>

    <div class="section-header">This month</div>
    <div class="tiles">
      <div class="tile">
        <h4>Expenses paid</h4>
        <div class="tile-big num">${gbp.format(exp.paid)}</div>
        <div class="tile-sub num">of ${gbp.format(exp.due)} due</div>
        <div class="progress ${exp.paid >= exp.due && exp.due > 0 ? "green" : ""}"><div style="width:${expPct}%"></div></div>
      </div>
      <div class="tile">
        <h4>Loan payments</h4>
        <div class="tile-big num">${gbp.format(loanPaid)}</div>
        <div class="tile-sub num">of ${gbp.format(loanPlan)} this month</div>
        <div class="progress"><div style="width:${loanPlan > 0 ? Math.min(100, loanPaid / loanPlan * 100) : 0}%"></div></div>
      </div>
      <div class="tile">
        <h4>Freelance pending</h4>
        <div class="tile-big num">${gbp.format(pendingTotal)}</div>
        <div class="tile-sub num">${gbp.format(incReceived)} received this month</div>
      </div>
      <div class="tile">
        <h4>Savings + Invest</h4>
        <div class="tile-big num">${gbp.format(inv.total)}</div>
        <div class="tile-sub num">${gbp.format(m.savingsAdded || 0)} saved this month</div>
      </div>
    </div>
    <div class="footer-note">Data stays on this device · ${monthName(homeYM)}</div>
  `;

  // animate the ring after paint
  requestAnimationFrame(() => requestAnimationFrame(() => {
    const arc = $("#view-home .arc");
    if (arc) arc.style.strokeDashoffset = arc.dataset.target;
  }));
}

/* ---------- Expenses ---------- */
window.expNav = d => { expYM = ymAdd(expYM, d); render(); };
window.togglePaid = (ym, id) => {
  const e = monthData(ym).expenses.find(x => x.id === id);
  if (!e) return;
  e.paid = !e.paid;
  save(); render();
};

function renderExpenses() {
  const keys = sortedMonthKeys();
  if (!keys.includes(expYM)) expYM = currentYM();
  const ym = expYM;
  const m = monthData(ym);
  const readOnly = ym < currentYM();
  const { due, paid } = expenseTotals(ym);
  const pct = due > 0 ? Math.min(100, paid / due * 100) : 0;

  const sorted = [...m.expenses].sort((a, b) => (a.dueDay || 32) - (b.dueDay || 32) || a.name.localeCompare(b.name));
  const rows = sorted.map(e => {
    const overdue = isOverdue(e, ym);
    return `<div class="row ${readOnly ? "" : "tappable"}" ${readOnly ? "" : `onclick="openExpenseSheet('${e.id}')"`}>
      <button class="check ${e.paid ? "on" : ""}" ${readOnly ? "disabled" : ""}
        onclick="event.stopPropagation(); togglePaid('${ym}','${e.id}')" aria-label="Mark paid">${tick}</button>
      <div class="row-main">
        <div class="row-title" style="${overdue ? "color:var(--red)" : ""}">${esc(e.name)}${e.recurring ? '<span class="badge grey">↻</span>' : ""}${overdue ? '<span class="badge red">Overdue</span>' : ""}</div>
        <div class="row-sub">${e.dueDay ? `Due ${ordinal(e.dueDay)}` : "No due day"}${e.recurring ? " · recurring" : ""}</div>
      </div>
      <div class="row-value num" style="${overdue ? "color:var(--red)" : ""}">${gbp.format(e.amount)}</div>
    </div>`;
  }).join("");

  const emptyIcon = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="15" rx="2.5"/><path d="M3 9.5h18"/><path d="M6.5 14.5h4"/></svg>';

  $("#view-expenses").innerHTML = `
    ${monthNav(ym, keys[0] < ym, ym < currentYM(), "expNav")}
    <div class="card card-pad">
      <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px">
        <div style="font-size:15px;font-weight:600" class="num">${gbp.format(paid)} of ${gbp.format(due)} paid</div>
        <div class="muted num" style="font-size:13px">${Math.round(pct)}%</div>
      </div>
      <div class="progress ${paid >= due && due > 0 ? "green" : ""}"><div style="width:${pct}%"></div></div>
    </div>
    ${m.expenses.length
      ? `<div class="card">${rows}</div>`
      : emptyState(emptyIcon, "No expenses yet",
          readOnly ? "Nothing was recorded for this month." : "Add your bills and outgoings for this month. Recurring ones roll over automatically.",
          readOnly ? null : "Add Expense", "openExpenseSheet()")}
    ${!readOnly && m.expenses.length ? `<button class="btn tinted add-fab" onclick="openExpenseSheet()">＋ Add Expense</button>` : ""}
    ${readOnly ? `<div class="footer-note">Past month — read-only history</div>` : ""}
  `;
}

/* ---------- Loans ---------- */
function loanMonthsLeft(loan) {
  if (!loan.endDate) return null;
  const diff = ymDiff(currentYM(), loan.endDate.slice(0, 7));
  return Math.max(0, diff);
}
function renderLoans() {
  const totalMonthly = state.loans.reduce((s, l) => s + (l.remainingBalance > 0 ? l.monthlyPayment : 0), 0);
  const totalRemaining = state.loans.reduce((s, l) => s + l.remainingBalance, 0);

  const cards = state.loans.map(l => {
    const orig = l.originalTotal || l.remainingBalance || 1;
    const paidOff = Math.max(0, orig - l.remainingBalance);
    const pct = Math.min(100, paidOff / orig * 100);
    const left = loanMonthsLeft(l);
    const cur = currentYM();
    const skipped = (l.skippedMonths || []).includes(cur);

    return `<div class="card tappable" onclick="openLoanSheet('${l.id}')" style="cursor:pointer">

        </div>
        <div style="font-size:30px;font-weight:700;letter-spacing:-0.8px;margin:10px 0 2px" class="num">${gbp.format(l.remainingBalance)}</div>
        <div class="muted" style="font-size:13px;margin-bottom:10px">remaining${left !== null ? ` · ${left} month${left === 1 ? "" : "s"} left` : ""}${skipped ? ' · <span class="warn">this month skipped</span>' : appliedThis ? ' · <span class="pos">paid this month</span>' : ""}</div>
        <div class="progress green"><div style="width:${pct}%"></div></div>
        <div class="muted num" style="font-size:12px;margin-top:6px">${gbp.format(paidOff)} of ${gbp.format(orig)} paid off (${Math.round(pct)}%)</div>
      </div>

  const emptyIcon = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9.5 12 4l9 5.5"/><path d="M5 10v8M9.7 10v8M14.3 10v8M19 10v8"/><path d="M3 20.5h18"/></svg>';

  $("#view-loans").innerHTML = `
    <div class="large-title">Loans</div>
    <div class="subtitle">Direct debits reduce balances automatically.</div>
    ${state.loans.length ? `
      <div class="card"><div class="pva-row">

        <div class="pva-val num">${gbp.format(totalMonthly)}</div>

        <div class="pva-cat">Total remaining</div>
        <div class="pva-val num">${gbp.format(totalRemaining)}</div>
      </div></div>
      ${cards}
      <button class="btn tinted add-fab" onclick="openLoanSheet()">＋ Add Loan</button>`
      : emptyState(emptyIcon, "No loans", "Track loans and their direct debits. Balances drop automatically when each DD day passes.", "Add Loan", "openLoanSheet()")}
  `;
}

  if (i.status === "pending") { i.status = "paid"; i.paidDate = today().toISOString().slice(0, 10); }

};

/* =====================================================================
   Sheets, forms & dialogs

let sheetOnSave = null;

function openSheet(title, bodyHTML, onSave, { saveLabel = "Save" } = {}) {
  $("#sheetTitle").textContent = title;
  $("#sheetBody").innerHTML = bodyHTML;
  $("#sheetSave").textContent = saveLabel;
  sheetOnSave = onSave;
  document.body.classList.add("locked");
  $("#sheetBackdrop").classList.add("show");
  $("#sheet").classList.add("show");
  const first = $("#sheetBody input[type=text]");
  if (first) setTimeout(() => first.focus({ preventScroll: true }), 260);
}
function closeSheet() {
  sheetOnSave = null;
  document.body.classList.remove("locked");
  $("#sheetBackdrop").classList.remove("show");
  $("#sheet").classList.remove("show");
}
$("#sheetCancel").addEventListener("click", closeSheet);
$("#sheetBackdrop").addEventListener("click", closeSheet);
$("#sheetSave").addEventListener("click", () => { if (sheetOnSave && sheetOnSave() !== false) closeSheet(); });

function showAlert(title, msg, actions) {
  // actions: [{label, style, value}]
  return new Promise(resolve => {
    $("#alertTitle").textContent = title;
    $("#alertMsg").textContent = msg;
    const box = $("#alertActions");
    box.innerHTML = "";
    for (const a of actions) {
      const b = document.createElement("button");
      b.textContent = a.label;
      if (a.style) b.className = a.style;
      b.addEventListener("click", () => { $("#alertBackdrop").classList.remove("show"); resolve(a.value); });
      box.appendChild(b);
    }
    $("#alertBackdrop").classList.add("show");
  });
}
const confirmDialog = (title, msg, actionLabel = "Delete", style = "destructive") =>
  showAlert(title, msg, [{ label: "Cancel", value: false }, { label: actionLabel, style, value: true }]);

/* ---------- Form field helpers ---------- */
const fText = (id, label, value = "", ph = "") =>
  `<div class="form-row"><label for="${id}">${label}</label><input type="text" id="${id}" value="${esc(value)}" placeholder="${ph}" autocomplete="off"></div>`;
const fAmount = (id, label, value = "") =>
  `<div class="form-row"><label for="${id}">${label}</label><input type="number" id="${id}" inputmode="decimal" step="0.01" min="0" value="${value === "" || value === null ? "" : value}" placeholder="£0.00"></div>`;
const fDay = (id, label, value = "") =>
  `<div class="form-row"><label for="${id}">${label}</label><input type="number" id="${id}" inputmode="numeric" min="1" max="31" step="1" value="${value ?? ""}" placeholder="1–31"></div>`;
const fDate = (id, label, value = "") =>
  `<div class="form-row"><label for="${id}">${label}</label><input type="date" id="${id}" value="${value || ""}"></div>`;
const fSwitch = (id, label, on) =>
  `<div class="form-row"><label for="${id}">${label}</label><span class="switch"><input type="checkbox" id="${id}" ${on ? "checked" : ""}><span class="knob"></span></span></div>`;
const fNote = (id, label, value = "") =>
  `<div class="form-row" style="align-items:flex-start;padding-top:12px"><label for="${id}">${label}</label><textarea id="${id}" placeholder="Optional">${esc(value)}</textarea></div>`;
const fSelect = (id, label, options, selected) =>
  `<div class="form-row"><label for="${id}">${label}</label><select id="${id}">${options.map(o => `<option value="${esc(o.value)}" ${o.value === selected ? "selected" : ""}>${esc(o.label)}</option>`).join("")}</select></div>`;
const deleteBtn = (fn) => `<button class="btn destructive" style="margin-top:4px" onclick="${fn}">Delete</button>`;

const val = id => $("#" + id).value.trim();
const num = id => { const v = parseFloat($("#" + id).value); return isNaN(v) ? 0 : v; };
const dayVal = id => { const v = parseInt($("#" + id).value, 10); return (v >= 1 && v <= 31) ? v : null; };
const checked = id => $("#" + id).checked;
function invalid(id, msg) { showAlert("Missing information", msg, [{ label: "OK", style: "bold", value: true }]); return false; }

/* ---------- Expense sheet ---------- */
window.openExpenseSheet = (id) => {
  const m = monthData(expYM);
  const e = id ? m.expenses.find(x => x.id === id) : null;
  openSheet(e ? "Edit Expense" : "New Expense", `
    <div class="form-group">
      ${fText("fx-name", "Name", e?.name || "", "e.g. Rent")}
      ${fAmount("fx-amount", "Amount", e?.amount ?? "")}
      ${fDay("fx-due", "Due day", e?.dueDay ?? "")}
      ${fSwitch("fx-rec", "Recurring monthly", e?.recurring)}
      ${e ? fSwitch("fx-paid", "Paid", e.paid) : ""}
    </div>
    <div class="form-hint">Recurring expenses appear automatically in every new month, unticked. One-offs stay in this month only.</div>
    ${e ? deleteBtn(`deleteExpense('${e.id}')`) : ""}
  `, () => {
    const name = val("fx-name"), amount = num("fx-amount");
    if (!name) return invalid("fx-name", "Give the expense a name.");
    if (amount <= 0) return invalid("fx-amount", "Enter an amount greater than zero.");
    const dueDay = dayVal("fx-due");
    const rec = checked("fx-rec");
    if (e) {
      e.name = name; e.amount = amount; e.dueDay = dueDay; e.paid = checked("fx-paid");
      if (rec && !e.recurring) { // became recurring
        const t = { id: uid(), name, amount, dueDay, startMonth: expYM, endMonth: null };
        state.recurring.push(t);
        e.recurring = true; e.recurringId = t.id;
      } else if (!rec && e.recurring) { // stopped recurring
        state.recurring = state.recurring.filter(t => t.id !== e.recurringId);
        e.recurring = false; e.recurringId = null;
      } else if (rec && e.recurringId) { // keep template in sync for future months
        const t = state.recurring.find(t => t.id === e.recurringId);
        if (t) { t.name = name; t.amount = amount; t.dueDay = dueDay; }
      }
    } else {
      const ex = { id: uid(), name, amount, dueDay, paid: false, recurring: rec, recurringId: null };
      if (rec) {
        const t = { id: uid(), name, amount, dueDay, startMonth: expYM, endMonth: null };
        state.recurring.push(t);
        ex.recurringId = t.id;
      }
      m.expenses.push(ex);
    }
    save(); render();
  });
};
window.deleteExpense = async (id) => {
  const m = monthData(expYM);
  const e = m.expenses.find(x => x.id === id);
  if (!e) return;
  closeSheet();
  const msg = e.recurring
    ? `“${e.name}” is recurring. Deleting removes it from this month and stops it appearing in future months. Past months keep their history.`
    : `Delete “${e.name}” from ${monthName(expYM)}?`;
  if (await confirmDialog("Delete expense?", msg)) {
    if (e.recurringId) state.recurring = state.recurring.filter(t => t.id !== e.recurringId);
    m.expenses = m.expenses.filter(x => x.id !== id);
    save(); render();
  }
};

/* ---------- Loan sheet ---------- */
window.openLoanSheet = (id) => {
  const l = id ? state.loans.find(x => x.id === id) : null;
  const cur = currentYM();
  const skipped = l ? (l.skippedMonths || []).includes(cur) : false;
  openSheet(l ? "Edit Loan" : "New Loan", `
    <div class="form-group">
      ${fText("fl-name", "Name", l?.name || "", "e.g. Car finance")}
      ${fAmount("fl-payment", "Monthly payment", l?.monthlyPayment ?? "")}
      ${fDay("fl-dd", "Direct debit day", l?.ddDay ?? "")}
      ${fDate("fl-end", "End date", l?.endDate || "")}
      ${fAmount("fl-balance", "Remaining balance", l?.remainingBalance ?? "")}
    </div>
    ${l ? `<div class="form-group">${fSwitch("fl-skip", `Skip ${monthShort(cur)} payment`, skipped)}</div>
    <div class="form-hint">Skipping stops (or reverses) this month's automatic balance reduction. Edit the balance above any time to correct for overpayments.</div>` :
    `<div class="form-hint">The balance drops by the monthly payment automatically each time the direct debit day passes.</div>`}
    ${l ? deleteBtn(`deleteLoan('${l.id}')`) : ""}
  `, () => {
    const name = val("fl-name"), payment = num("fl-payment"), balance = num("fl-balance");
    const ddDay = dayVal("fl-dd"), endDate = val("fl-end") || null;
    if (!name) return invalid("fl-name", "Give the loan a name.");
    if (payment <= 0) return invalid("fl-payment", "Enter the monthly payment.");
    if (!ddDay) return invalid("fl-dd", "Enter the direct debit day (1–31).");
    if (l) {
      l.name = name; l.monthlyPayment = payment; l.ddDay = ddDay; l.endDate = endDate;
      l.remainingBalance = balance; // manual override always wins
      const wasSkipped = (l.skippedMonths || []).includes(cur);
      const wantSkip = checked("fl-skip");
      if (wantSkip && !wasSkipped) {
        // If this month already auto-applied, reverse it.
        if ((l.appliedMonths || []).includes(cur)) {
          l.appliedMonths = l.appliedMonths.filter(m => m !== cur);
          l.remainingBalance = +(l.remainingBalance + l.monthlyPayment).toFixed(2);
        }
        l.skippedMonths = [...(l.skippedMonths || []), cur];
      } else if (!wantSkip && wasSkipped) {
        l.skippedMonths = l.skippedMonths.filter(m => m !== cur);
        // engine will re-apply on next run if the DD day has passed
      }
    } else {
      const loan = {
        id: uid(), name, monthlyPayment: payment, ddDay, endDate,
        originalTotal: balance, remainingBalance: balance,
        startMonth: cur, appliedMonths: [], skippedMonths: []
      };
      // The entered balance already reflects any payment taken earlier this month.
      if (today().getDate() >= ddDay) loan.appliedMonths.push(cur);
      state.loans.push(loan);
    }
    save(); render();
  });
};
window.deleteLoan = async (id) => {
  const l = state.loans.find(x => x.id === id);
  if (!l) return;
  closeSheet();
  if (await confirmDialog("Delete loan?", `Delete “${l.name}” and its payment history?`)) {
    state.loans = state.loans.filter(x => x.id !== id);
    save(); render();
  }
};

    if (!title) return invalid("fi-title", "Give this entry a client or project name.");
    if (amount <= 0) return invalid("fi-amount", "Enter an amount greater than zero.");
    const isPaid = checked("fi-paid");
    if (i) {
      i.title = title; i.amount = amount; i.expectedDate = val("fi-date") || null; i.note = val("fi-note");
      if (isPaid && i.status !== "paid") { i.status = "paid"; i.paidDate = today().toISOString().slice(0, 10); }
      else if (!isPaid && i.status === "paid") { i.status = "pending"; i.paidDate = null; }
    } else {
      state.income.push({
        id: uid(), title, amount, expectedDate: val("fi-date") || null,
        status: isPaid ? "paid" : "pending",
        paidDate: isPaid ? today().toISOString().slice(0, 10) : null,
        note: val("fi-note")
      });
    }
    save(); render();
  });
};
window.deleteIncome = async (id) => {
  const i = state.income.find(x => x.id === id);
  if (!i) return;
  closeSheet();
  if (await confirmDialog("Delete income entry?", `Delete “${i.title}”?`)) {
    state.income = state.income.filter(x => x.id !== id);
    save(); render();
  }
};

/* ---------- Invest sheets ---------- */
window.openInvestSheet = (kind, id) => {
  const list = state[kind];
  const e = id ? list.find(x => x.id === id) : null;
  const label = kind === "savings" ? "Savings Pot" : "Investment";
  openSheet(e ? `Edit ${label}` : `New ${label}`, `
    <div class="form-group">
      ${fText("fv-name", "Name", e?.name || "", kind === "savings" ? "e.g. Emergency fund" : "e.g. Index fund")}
      ${fAmount("fv-value", "Current value", e?.value ?? "")}
      ${fNote("fv-note", "Note", e?.note || "")}
    </div>
    <div class="form-hint">Editing the value simply replaces it. Use “Add to Savings” on the Invest tab for contributions that count toward your monthly target.</div>
    ${e ? deleteBtn(`deleteInvest('${kind}','${e.id}')`) : ""}
  `, () => {
    const name = val("fv-name");
    if (!name) return invalid("fv-name", "Give it a name.");
    const value = num("fv-value"), note = val("fv-note");
    if (e) { e.name = name; e.value = value; e.note = note; }
    else list.push({ id: uid(), name, value, note });
    save(); render();
  });
};
window.deleteInvest = async (kind, id) => {
  const e = state[kind].find(x => x.id === id);
  if (!e) return;
  closeSheet();
  if (await confirmDialog("Delete entry?", `Delete “${e.name}” (${fmtPlain(e.value)})?`)) {
    state[kind] = state[kind].filter(x => x.id !== id);
    save(); render();
  }
};
window.openAddToSavings = () => {
  if (!state.savings.length) return;
  openSheet("Add to Savings", `
    <div class="form-group">
      ${fSelect("fs-pot", "Pot", state.savings.map(s => ({ value: s.id, label: s.name })), state.savings[0].id)}
      ${fAmount("fs-amount", "Amount", "")}
    </div>
    <div class="form-hint">This adds to the pot's value and counts toward this month's savings target for your health score.</div>
  `, () => {
    const amount = num("fs-amount");
    if (amount <= 0) return invalid("fs-amount", "Enter an amount greater than zero.");
    const pot = state.savings.find(s => s.id === val("fs-pot"));
    if (!pot) return false;
    pot.value = +(pot.value + amount).toFixed(2);
    const m = monthData(currentYM());
    m.savingsAdded = +((m.savingsAdded || 0) + amount).toFixed(2);
    save(); render();
  }, { saveLabel: "Add" });
};

/* ---------- Wishlist sheet ---------- */
window.openWishlistSheet = (id) => {
  const w = id ? state.wishlist.find(x => x.id === id) : null;
  const type = w?.type || "outright";
  openSheet(w ? "Edit Wishlist Item" : "New Wishlist Item", `
    <div class="segmented form-seg" id="fw-seg">
      <button type="button" class="${type === "outright" ? "active" : ""}" data-v="outright">Outright</button>
      <button type="button" class="${type === "installments" ? "active" : ""}" data-v="installments">Installments</button>
    </div>
    <div class="form-group">
      ${fText("fw-name", "Name", w?.name || "", "e.g. New laptop")}
      ${fAmount("fw-price", "Price", w?.price ?? "")}
    </div>
    <div class="form-group" id="fw-inst" style="${type === "installments" ? "" : "display:none"}">
      ${fAmount("fw-monthly", "Monthly amount", w?.monthlyAmount ?? "")}
      ${fDay("fw-months", "Number of months", w?.months ?? "").replace("1–31", "e.g. 12").replace('max="31"', 'max="120"')}
    </div>
    <div class="form-hint" id="fw-hint">${type === "installments" ? "Buying creates a recurring expense that expires automatically after the last installment." : "Buying adds a one-off expense to this month, ticked as paid."}</div>
    ${w && !w.purchased ? deleteBtn(`deleteWishlist('${w.id}')`) : ""}
    ${w && w.purchased ? deleteBtn(`deleteWishlist('${w.id}')`).replace(">Delete<", ">Remove from history<") : ""}
  `, () => {
    const name = val("fw-name"), price = num("fw-price");
    const t = $("#fw-seg .active").dataset.v;
    if (!name) return invalid("fw-name", "Give the item a name.");
    if (price <= 0) return invalid("fw-price", "Enter the price.");
    let monthlyAmount = null, months = null;
    if (t === "installments") {
      monthlyAmount = num("fw-monthly");
      months = parseInt($("#fw-months").value, 10) || 0;
      if (monthlyAmount <= 0 || months <= 0) return invalid("fw-monthly", "Enter the monthly amount and number of months.");
    }
    if (w) Object.assign(w, { name, price, type: t, monthlyAmount, months });
    else state.wishlist.push({ id: uid(), name, price, type: t, monthlyAmount, months, purchased: false, purchasedDate: null });
    save(); render();
  });
  $("#fw-seg").addEventListener("click", ev => {
    const b = ev.target.closest("button"); if (!b) return;
    $$("#fw-seg button").forEach(x => x.classList.toggle("active", x === b));
    $("#fw-inst").style.display = b.dataset.v === "installments" ? "" : "none";
    $("#fw-hint").textContent = b.dataset.v === "installments"
      ? "Buying creates a recurring expense that expires automatically after the last installment."
      : "Buying adds a one-off expense to this month, ticked as paid.";
  });
};
window.deleteWishlist = async (id) => {
  const w = state.wishlist.find(x => x.id === id);
  if (!w) return;
  closeSheet();
  if (await confirmDialog("Remove item?", `Remove “${w.name}” from the wishlist?${w.purchased ? " Its expense entries are kept." : ""}`, "Remove")) {
    state.wishlist = state.wishlist.filter(x => x.id !== id);
    save(); render();
  }
};
window.buyItem = async (id) => {
  const w = state.wishlist.find(x => x.id === id);
  if (!w || w.purchased) return;
  const cur = currentYM();
  const msg = w.type === "installments"
    ? `This adds a recurring expense of ${fmtPlain(w.monthlyAmount)}/month for ${w.months} months, starting now.`
    : `This adds ${fmtPlain(w.price)} as a paid one-off expense in ${monthName(cur)}.`;
  if (!await confirmDialog(`Buy ${w.name}?`, msg, "Buy", "bold")) return;
  const m = monthData(cur);
  if (w.type === "installments") {
    const t = {
      id: uid(), name: w.name, amount: w.monthlyAmount, dueDay: today().getDate(),
      startMonth: cur, endMonth: ymAdd(cur, w.months - 1)
    };
    state.recurring.push(t);
    m.expenses.push({ id: uid(), name: w.name, amount: w.monthlyAmount, dueDay: t.dueDay, paid: false, recurring: true, recurringId: t.id });
  } else {
    m.expenses.push({ id: uid(), name: w.name, amount: w.price, dueDay: today().getDate(), paid: true, recurring: false, recurringId: null });
  }
  w.purchased = true;
  w.purchasedDate = today().toISOString().slice(0, 10);
  save(); render();
};

/* ---------- Settings ---------- */
window.openSettings = () => {
  const s = state.settings;
  openSheet("Settings", `
    <div class="section-header" style="margin-top:4px">Monthly plan</div>
    <div class="form-group">
      ${fAmount("st-spend", "Spending plan", s.spendingPlan || "")}
      ${fAmount("st-save", "Savings target", s.savingsTarget || "")}
      ${fAmount("st-income", "Expected freelance", s.expectedFreelance || "")}
    </div>
    <div class="form-hint">The spending plan drives the overspending part of your health score. Actual income entries override the freelance figure in the Plan view.</div>
    <div class="section-header">Backup</div>
    <div class="form-group">
      <div class="form-row tappable" style="cursor:pointer" onclick="exportBackup()">
        <label style="color:var(--accent)">Export backup…</label>
      </div>
      <div class="form-row tappable" style="cursor:pointer" onclick="importBackup()">
        <label style="color:var(--accent)">Import backup…</label>
      </div>
    </div>
    <div class="form-hint">Export downloads all data as a JSON file. Import restores from one, replacing everything on this device.</div>
  `, () => {
    state.settings = {
      spendingPlan: num("st-spend"),
      savingsTarget: num("st-save"),
      expectedFreelance: num("st-income")
    };
    // keep the current month's plan snapshot in sync
    const m = monthData(currentYM());
    if (m) m.plan = { ...state.settings };
    save(); render();
  });
};
window.exportBackup = () => {
  const blob = new Blob([JSON.stringify(state, null, 2)], { type: "application/json" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = `finance-health-backup-${today().toISOString().slice(0, 10)}.json`;
  document.body.appendChild(a);
  a.click();
  a.remove();
  setTimeout(() => URL.revokeObjectURL(a.href), 2000);
};
window.importBackup = () => $("#importFile").click();
$("#importFile").addEventListener("change", async (ev) => {
  const file = ev.target.files[0];
  ev.target.value = "";
  if (!file) return;
  let data;
  try { data = JSON.parse(await file.text()); }
  catch { showAlert("Import failed", "That file isn't a valid Finance Health backup.", [{ label: "OK", style: "bold", value: true }]); return; }
  if (!data || typeof data !== "object" || !data.months || !data.settings) {
    showAlert("Import failed", "That file isn't a valid Finance Health backup.", [{ label: "OK", style: "bold", value: true }]);
    return;
  }
  if (await confirmDialog("Restore backup?", "This replaces ALL current data on this device with the backup. This can't be undone.", "Restore")) {
    state = Object.assign(defaultState(), data);
    save();
    closeSheet();
    homeYM = currentYM(); expYM = currentYM();
    render();
  }
});

/* ---------- Boot ---------- */
$("#hdrGear").addEventListener("click", () => window.openSettings());
$("#tabbar").addEventListener("click", ev => {
  const b = ev.target.closest(".tab");
  if (b) switchTab(b.dataset.tab);
});
document.addEventListener("visibilitychange", () => {
  // re-run rollover logic when returning to the app (new day / new month)
  if (!document.hidden) { homeYM = currentYM(); expYM = currentYM(); render(); }
});

load();
runEngine();
switchTab("home");

if ("serviceWorker" in navigator && location.protocol !== "file:") {
  window.addEventListener("load", () => navigator.serviceWorker.register("./sw.js").catch(() => {}));
}
</script>
</body>
</html>
